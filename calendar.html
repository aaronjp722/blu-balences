<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar | Blu Balence</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #202124;
      --surface: #292a2d;
      --surface2: #35363a;
      --surface3: #3c3d42;
      --border: rgba(255,255,255,.10);
      --border2: rgba(255,255,255,.06);
      --text: #e8eaed;
      --text-sub: #9aa0a6;
      --text-dim: #5f6368;
      --primary: #1a73e8;
      --primary-light: #4285f4;
      --primary-dark: #1557b0;
      --today-bg: rgba(26,115,232,.10);
      --input-bg: #202124;

      /* Dispo palette (Google-spectrum) */
      --c-pending:    #1a73e8;
      --c-sold:       #0f9d58;
      --c-rescheduled:#f9ab00;
      --c-no_show:    #e37400;
      --c-canceled:   #d93025;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }
    .logo-mark {
      width: 32px; height: 32px;
      background: var(--primary);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 15px; color: #fff; flex-shrink: 0;
    }
    .logo-text { font-size: 20px; font-weight: 400; color: var(--text); letter-spacing: -.3px; }
    .topbar-sep { width: 1px; height: 24px; background: var(--border); }
    .topbar-title { font-size: 18px; font-weight: 400; color: var(--text); }
    .topbar-spacer { flex: 1; }

    .tz-label { font-size: 12px; color: var(--text-sub); }

    select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      padding: 6px 10px;
      cursor: pointer;
    }
    select:focus { outline: none; border-color: var(--primary); }

    .btn {
      padding: 8px 20px;
      border-radius: 20px;
      border: none;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s, box-shadow .15s;
      letter-spacing: .25px;
    }
    .btn:active { transform: scale(.98); }
    .btn-primary { background: var(--primary); color: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.4); }
    .btn-primary:hover { background: var(--primary-light); }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); border-radius: 20px; }
    .btn-ghost:hover { background: var(--surface2); }
    .btn-danger { background: var(--c-canceled); color: #fff; }
    .btn-danger:hover { background: #c5221f; }

    .btn-icon {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; border: none;
      background: transparent; color: var(--text-sub);
      cursor: pointer; font-size: 20px; transition: background .15s;
    }
    .btn-icon:hover { background: var(--surface2); }

    /* ── TOOLBAR ── */
    .cal-toolbar {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .btn-today {
      padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
      background: transparent; color: var(--text); font-family: inherit;
      font-size: 13px; font-weight: 500; cursor: pointer; transition: background .15s;
    }
    .btn-today:hover { background: var(--surface2); }

    .period-label {
      font-size: 22px; font-weight: 400;
      min-width: 200px; color: var(--text);
      letter-spacing: -.3px;
    }

    .view-tabs {
      display: flex;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px; gap: 2px;
    }
    .view-tab {
      padding: 5px 16px; border-radius: 18px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      color: var(--text-sub); border: none; background: transparent;
      font-family: inherit; transition: background .15s, color .15s;
    }
    .view-tab.active { background: var(--primary); color: #fff; }
    .view-tab:not(.active):hover { background: var(--surface3); color: var(--text); }

    .cal-main { flex: 1; overflow: hidden; position: relative; }

    /* ── MONTH ── */
    .month-view { display: flex; flex-direction: column; height: 100%; }
    .month-header {
      display: grid; grid-template-columns: repeat(7,1fr);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .month-dow {
      padding: 8px 0; text-align: center;
      font-size: 11px; font-weight: 500; color: var(--text-sub);
      text-transform: uppercase; letter-spacing: .08em;
    }
    .month-grid {
      display: grid; grid-template-columns: repeat(7,1fr);
      grid-template-rows: repeat(6,1fr); flex: 1; overflow: hidden;
    }
    .month-cell {
      border-right: 1px solid var(--border2);
      border-bottom: 1px solid var(--border2);
      padding: 4px; cursor: pointer;
      transition: background .1s; overflow: hidden; min-height: 0;
      position: relative;
    }
    .month-cell:hover { background: rgba(255,255,255,.03); }
    .month-cell.other-month .cell-day { color: var(--text-dim); }
    .month-cell.today { background: var(--today-bg); }
    .month-cell.today .cell-day {
      background: var(--primary); color: #fff;
      border-radius: 50%; width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
    }
    .month-cell.drag-over {
      background: rgba(26,115,232,.12);
      outline: 2px solid var(--primary);
      outline-offset: -2px;
    }
    .cell-day {
      font-size: 12px; font-weight: 500;
      margin-bottom: 2px; width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
    }
    .event-pill {
      color: #fff; font-size: 11px; font-weight: 500;
      padding: 2px 6px; border-radius: 4px; margin-bottom: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      cursor: grab; transition: filter .1s, opacity .15s;
      user-select: none; display: block;
    }
    .event-pill:active { cursor: grabbing; }
    .event-pill.dragging { opacity: .35; }
    .event-pill:hover { filter: brightness(1.12); }
    .more-events {
      font-size: 11px; color: var(--text-sub);
      padding: 1px 6px; cursor: pointer; border-radius: 4px;
    }
    .more-events:hover { background: var(--surface2); color: var(--primary); }

    /* ── WEEK ── */
    .week-view { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
    .week-header-row {
      display: grid; grid-template-columns: 56px repeat(7,1fr);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .week-gutter { border-right: 1px solid var(--border2); }
    .week-header-day {
      padding: 8px 4px; text-align: center;
      border-left: 1px solid var(--border2); cursor: pointer;
      transition: background .1s;
    }
    .week-header-day:hover { background: rgba(255,255,255,.04); }
    .week-header-dow { font-size: 11px; font-weight: 500; color: var(--text-sub); text-transform: uppercase; letter-spacing: .05em; }
    .week-header-num { font-size: 24px; font-weight: 400; color: var(--text); line-height: 1.3; }
    .week-header-num.today {
      color: #fff; background: var(--primary);
      border-radius: 50%; width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      margin: 2px auto 0; font-size: 19px;
    }
    .week-body { flex: 1; overflow-y: auto; overflow-x: hidden; }
    .week-body::-webkit-scrollbar { width: 6px; }
    .week-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .week-time-grid { display: grid; grid-template-columns: 56px repeat(7,1fr); position: relative; }
    .week-hour-label {
      font-size: 10px; color: var(--text-dim); text-align: right;
      padding-right: 8px; height: 60px;
      display: flex; align-items: flex-start; padding-top: 2px;
      border-right: 1px solid var(--border2); flex-shrink: 0;
    }
    .week-col { border-left: 1px solid var(--border2); position: relative; }
    .week-col:hover { background: rgba(26,115,232,.03); }
    .hour-line { height: 60px; border-bottom: 1px solid var(--border2); }

    /* ── DAY ── */
    .day-view { display: flex; flex-direction: column; height: 100%; }
    .day-header { padding: 10px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .day-header h2 { font-size: 22px; font-weight: 400; }
    .day-body { flex: 1; overflow-y: auto; display: grid; grid-template-columns: 56px 1fr; }
    .day-body::-webkit-scrollbar { width: 6px; }
    .day-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .day-labels { display: flex; flex-direction: column; }
    .day-label {
      height: 60px; font-size: 10px; color: var(--text-dim);
      text-align: right; padding-right: 8px; padding-top: 4px;
      border-bottom: 1px solid var(--border2); flex-shrink: 0;
      border-right: 1px solid var(--border2);
    }
    .day-col { border-left: 1px solid var(--border2); position: relative; }
    .day-hour-row { height: 60px; border-bottom: 1px solid var(--border2); cursor: pointer; }
    .day-hour-row:hover { background: rgba(26,115,232,.04); }
    .day-event {
      position: absolute; left: 4px; right: 4px;
      border-radius: 6px; padding: 4px 8px;
      font-size: 12px; font-weight: 500; color: #fff;
      cursor: pointer; z-index: 2; min-height: 24px;
    }
    .day-event:hover { filter: brightness(1.1); }

    /* ── AGENDA (ALL) ── */
    .agenda-view { height: 100%; overflow-y: auto; padding: 16px 24px; }
    .agenda-view::-webkit-scrollbar { width: 6px; }
    .agenda-view::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .agenda-date-group { margin-bottom: 20px; }
    .agenda-date-header {
      display: flex; align-items: baseline; gap: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border2);
      margin-bottom: 6px;
    }
    .agenda-date-header.today .agenda-date-num { color: var(--primary); }
    .agenda-date-num { font-size: 26px; font-weight: 300; color: var(--text); }
    .agenda-date-label { font-size: 13px; color: var(--text-sub); }
    .agenda-item {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 10px 10px; border-radius: 8px;
      cursor: pointer; transition: background .1s; margin-bottom: 2px;
    }
    .agenda-item:hover { background: var(--surface2); }
    .agenda-time { font-size: 12px; color: var(--text-sub); min-width: 80px; padding-top: 2px; flex-shrink: 0; }
    .agenda-bar { width: 4px; border-radius: 4px; align-self: stretch; flex-shrink: 0; min-height: 36px; }
    .agenda-content { flex: 1; }
    .agenda-title { font-size: 14px; font-weight: 500; color: var(--text); }
    .agenda-meta { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
    .agenda-empty {
      text-align: center; padding: 80px 20px;
      color: var(--text-sub); font-size: 14px;
    }
    .agenda-empty-icon { font-size: 52px; margin-bottom: 16px; }

    /* ── MODAL ── */
    .modal-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.65); z-index: 1000;
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px;
      width: 100%; max-width: 480px;
      max-height: 90vh; overflow-y: auto;
      box-shadow: 0 24px 60px rgba(0,0,0,.55);
    }
    .modal::-webkit-scrollbar { width: 4px; }
    .modal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .modal-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
    .modal-title { font-size: 20px; font-weight: 400; color: var(--text); }
    .modal-close {
      width: 32px; height: 32px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; border: none;
      background: transparent; color: var(--text-sub);
      cursor: pointer; font-size: 20px;
      transition: background .15s;
    }
    .modal-close:hover { background: var(--surface2); color: var(--text); }

    .form-group { margin-bottom: 16px; }
    label {
      display: block; font-size: 11px; font-weight: 500;
      color: var(--text-sub); text-transform: uppercase;
      letter-spacing: .06em; margin-bottom: 6px;
    }

    input[type="text"],
    input[type="tel"],
    input[type="date"],
    input[type="time"],
    textarea {
      width: 100%; padding: 9px 0;
      background: transparent;
      border: none; border-bottom: 1px solid var(--border);
      color: var(--text); font-family: inherit; font-size: 14px;
      transition: border-color .15s; border-radius: 0;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--primary); }
    input::placeholder, textarea::placeholder { color: var(--text-dim); }
    textarea { resize: vertical; min-height: 68px; }
    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(.5); cursor: pointer; }
    select.form-select {
      width: 100%; background: transparent;
      border: none; border-bottom: 1px solid var(--border);
      color: var(--text); font-family: inherit; font-size: 14px;
      border-radius: 0; padding: 9px 0;
    }
    select.form-select:focus { outline: none; border-color: var(--primary); }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .modal-footer { display: flex; gap: 8px; margin-top: 22px; justify-content: flex-end; align-items: center; }

    .detail-field { margin-bottom: 14px; }
    .detail-label { font-size: 11px; font-weight: 500; color: var(--text-sub); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 3px; }
    .detail-value { font-size: 14px; color: var(--text); }

    /* Dispo badge */
    .dispo-badge {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 12px;
      font-size: 11px; font-weight: 600; letter-spacing: .04em;
      text-transform: uppercase;
    }

    /* Dispo controls in detail modal */
    .dispo-section {
      margin-top: 18px; padding-top: 16px;
      border-top: 1px solid var(--border2);
    }
    .dispo-section-label {
      font-size: 11px; font-weight: 500; color: var(--text-sub);
      text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px;
    }
    .dispo-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .dispo-btn {
      padding: 5px 14px; border-radius: 16px; border: 1px solid;
      font-size: 12px; font-weight: 500; cursor: pointer;
      font-family: inherit; transition: all .15s; letter-spacing: .02em;
      background: transparent;
    }
    .dispo-btn[data-d="pending"]     { color: var(--c-pending);     border-color: var(--c-pending);     }
    .dispo-btn[data-d="sold"]        { color: var(--c-sold);         border-color: var(--c-sold);         }
    .dispo-btn[data-d="rescheduled"] { color: var(--c-rescheduled); border-color: var(--c-rescheduled); }
    .dispo-btn[data-d="no_show"]     { color: var(--c-no_show);     border-color: var(--c-no_show);     }
    .dispo-btn[data-d="canceled"]    { color: var(--c-canceled);    border-color: var(--c-canceled);    }
    .dispo-btn.active { color: #fff !important; }
    .dispo-btn[data-d="pending"].active     { background: var(--c-pending);     }
    .dispo-btn[data-d="sold"].active        { background: var(--c-sold);         }
    .dispo-btn[data-d="rescheduled"].active { background: var(--c-rescheduled); }
    .dispo-btn[data-d="no_show"].active     { background: var(--c-no_show);     }
    .dispo-btn[data-d="canceled"].active    { background: var(--c-canceled);    }
    .dispo-btn:not(.active):hover { opacity: .75; }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 24px;
      font-size: 14px; font-weight: 500; color: var(--text);
      box-shadow: 0 8px 30px rgba(0,0,0,.5);
      transition: transform .25s ease; z-index: 9999; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { border-color: var(--c-canceled); color: #ff6b6b; }

    .loading-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.5); z-index: 2000;
      align-items: center; justify-content: center;
    }
    .loading-overlay.show { display: flex; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,.15);
      border-top-color: var(--primary); border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    @media (max-width: 640px) {
      .form-row { grid-template-columns: 1fr; }
      .view-tab { padding: 5px 10px; font-size: 12px; }
      .period-label { font-size: 16px; min-width: 120px; }
      .tz-label { display: none; }
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <a class="logo" href="/">
    <div class="logo-mark">B</div>
    <span class="logo-text">Blu Balence</span>
  </a>
  <div class="topbar-sep"></div>
  <span class="topbar-title">Calendar</span>
  <div class="topbar-spacer"></div>
  <span class="tz-label">Timezone</span>
  <select id="tz-select" onchange="onTzChange()">
    <option value="America/New_York">Eastern (EST/EDT)</option>
    <option value="America/Chicago">Central (CST/CDT)</option>
    <option value="America/Denver">Mountain (MST/MDT)</option>
    <option value="America/Los_Angeles">Pacific (PST/PDT)</option>
    <option value="America/Phoenix">Arizona (MST)</option>
    <option value="America/Anchorage">Alaska (AKST)</option>
    <option value="Pacific/Honolulu">Hawaii (HST)</option>
    <option value="UTC">UTC</option>
  </select>
  <button class="btn btn-primary" onclick="openNewModal()">+ New Appointment</button>
</div>

<!-- CALENDAR TOOLBAR -->
<div class="cal-toolbar">
  <div style="display:flex;align-items:center;gap:4px;">
    <button class="btn-today" onclick="goToday()">Today</button>
    <button class="btn-icon" onclick="navigate(-1)">&#8249;</button>
    <button class="btn-icon" onclick="navigate(1)">&#8250;</button>
  </div>
  <span class="period-label" id="period-label"></span>
  <div style="flex:1;"></div>
  <div class="view-tabs">
    <button class="view-tab active" onclick="setView('month')">Month</button>
    <button class="view-tab" onclick="setView('week')">Week</button>
    <button class="view-tab" onclick="setView('day')">Day</button>
    <button class="view-tab" onclick="setView('agenda')">All</button>
  </div>
</div>

<div class="cal-main" id="cal-main"></div>

<!-- CREATE / EDIT MODAL -->
<div class="modal-backdrop" id="appt-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">New Appointment</span>
      <button class="modal-close" onclick="closeModal('appt-modal')">&#215;</button>
    </div>
    <input type="hidden" id="edit-id">
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="appt-name" placeholder="Appointment name" required>
    </div>
    <div class="form-group">
      <label>Client Name</label>
      <input type="text" id="appt-client" placeholder="Jane Smith">
    </div>
    <div class="form-row">
      <div class="form-group" style="margin-bottom:0;">
        <label>Phone</label>
        <input type="tel" id="appt-phone" placeholder="(555) 000-0000">
      </div>
      <div class="form-group" style="margin-bottom:0;">
        <label>Email</label>
        <input type="text" id="appt-email" placeholder="jane@example.com">
      </div>
    </div>
    <div class="form-row" style="margin-top:16px;">
      <div class="form-group" style="margin-bottom:0;">
        <label>Date</label>
        <input type="date" id="appt-date" required>
      </div>
      <div class="form-group" style="margin-bottom:0;">
        <label>Time</label>
        <input type="time" id="appt-time" required>
      </div>
    </div>
    <div class="form-group" style="margin-top:16px;">
      <label>Timezone</label>
      <select id="appt-tz" class="form-select">
        <option value="America/New_York">Eastern (EST/EDT)</option>
        <option value="America/Chicago">Central (CST/CDT)</option>
        <option value="America/Denver">Mountain (MST/MDT)</option>
        <option value="America/Los_Angeles">Pacific (PST/PDT)</option>
        <option value="America/Phoenix">Arizona (MST)</option>
        <option value="America/Anchorage">Alaska (AKST)</option>
        <option value="Pacific/Honolulu">Hawaii (HST)</option>
        <option value="UTC">UTC</option>
      </select>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea id="appt-notes" placeholder="Additional details…"></textarea>
    </div>
    <div class="modal-footer">

<script>
const WEBHOOK_URL   = "https://hook.us1.make.com/e3av1w86ovv5w89fs3hwq50aln33oq3c";
const SUPABASE_URL  = "https://rfdvogakvyodixgpvqvz.supabase.co";
const SUPABASE_KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmZHZvZ2FrdnlvZGl4Z3B2cXZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcwMzU4MDMsImV4cCI6MjA4MjYxMTgwM30.UumTuz6AaKL8uYmmNxFj1ec5CInHVNQowt6LRo4cu-E";

const DISPO_COLORS = {
  pending:     '#1a73e8',
  sold:        '#0f9d58',
  rescheduled: '#f9ab00',
  no_show:     '#e37400',
  canceled:    '#d93025'
};
const DISPO_LABELS = {
  pending:     'Pending',
  sold:        'Sold',
  rescheduled: 'Rescheduled',
  no_show:     'No Show',
  canceled:    'Canceled'
};

async function sbFetch(path, opts = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...opts,
    headers: {
      apikey:          SUPABASE_KEY,
      Authorization:   `Bearer ${SUPABASE_KEY}`,
      "Content-Type":  "application/json",
      Prefer:          opts.prefer || "return=representation",
      ...(opts.headers || {})
    }
  });
  if (!res.ok) { const e = await res.text(); throw new Error(e); }
  const t = await res.text();
  return t ? JSON.parse(t) : null;
}

let appointments  = [];
let currentView   = "month";
let cursor        = new Date();
let displayTz     = Intl.DateTimeFormat().resolvedOptions().timeZone;
let detailEventId = null;
let draggedApptId = null;

function dispoColor(d) { return DISPO_COLORS[d] || DISPO_COLORS.pending; }

function tzAbbr(tz) {
  return new Intl.DateTimeFormat("en-US", { timeZone: tz, timeZoneName: "short" })
    .formatToParts(new Date()).find(p => p.type === "timeZoneName")?.value || tz;
}

function localToUtc(dateStr, timeStr, tz) {
  const base = new Date(`${dateStr}T${timeStr}:00`);
  const [wH, wM] = timeStr.split(":").map(Number);
  const parts = new Intl.DateTimeFormat("en-US", { timeZone: tz, hour: "2-digit", minute: "2-digit", hour12: false }).formatToParts(base);
  const tzH = parseInt(parts.find(p => p.type === "hour").value);
  const tzM = parseInt(parts.find(p => p.type === "minute").value);
  return new Date(base.getTime() + ((wH - tzH) * 60 + (wM - tzM)) * 60000).toISOString();
}

function fmtTime(iso, tz) {
  return new Intl.DateTimeFormat("en-US", { timeZone: tz, hour: "numeric", minute: "2-digit", hour12: true }).format(new Date(iso));
}

function fmtDate(iso, tz) {
  return new Intl.DateTimeFormat("en-US", { timeZone: tz, weekday: "long", year: "numeric", month: "long", day: "numeric" }).format(new Date(iso));
}

function dateParts(iso, tz) {
  const parts = new Intl.DateTimeFormat("en-CA", {
    timeZone: tz, year: "numeric", month: "2-digit", day: "2-digit",
    hour: "2-digit", minute: "2-digit", hour12: false
  }).formatToParts(new Date(iso));
  const g = t => parts.find(p => p.type === t).value;
  return { year: +g("year"), month: +g("month"), day: +g("day"), hour: +g("hour"), minute: +g("minute") };
}

function isFuture(iso) { return new Date(iso) > new Date(); }

function fmtHour(h) {
  if (h === 0)  return "12 AM";
  if (h < 12)   return `${h} AM`;
  if (h === 12) return "12 PM";
  return `${h - 12} PM`;
}

function weekStart(d) {
  const w = new Date(d);
  w.setDate(w.getDate() - w.getDay());
  return w;
}

function dispoBadgeHtml(dispo) {
  const c = dispoColor(dispo);
  const l = DISPO_LABELS[dispo] || dispo;
  return `<span class="dispo-badge" style="background:${c}22;color:${c};border:1px solid ${c}44;">${l}</span>`;
}

async function loadAppointments() {
  showLoading(true);
  try {
    appointments = await sbFetch("appointments?select=*&order=appointment_utc.asc") || [];
    render();
  } catch (e) { console.error(e); showToast("Failed to load appointments", "error"); }
  finally { showLoading(false); }
}

async function saveAppointment() {
  const id     = document.getElementById("edit-id").value;
  const name   = document.getElementById("appt-name").value.trim();
  const client = document.getElementById("appt-client").value.trim();
  const phone  = document.getElementById("appt-phone").value.trim();
  const email  = document.getElementById("appt-email").value.trim();
  const date   = document.getElementById("appt-date").value;
  const time   = document.getElementById("appt-time").value;
  const tz     = document.getElementById("appt-tz").value;
  const notes  = document.getElementById("appt-notes").value.trim();

  if (!name || !date || !time) { showToast("Name, date, and time are required", "error"); return; }

  const apptUtc = localToUtc(date, time, tz);
  const payload = {
    name,
    client_name:     client || null,
    phone:           phone  || null,
    email:           email  || null,
    notes:           notes  || null,
    appointment_utc: apptUtc,
    timezone:        tz
  };

  showLoading(true);
  try {
    if (id) {
      await sbFetch(`appointments?id=eq.${id}`, { method: "PATCH", prefer: "return=minimal", body: JSON.stringify(payload) });
      showToast("Appointment updated");
    } else {
      await sbFetch("appointments", { method: "POST", body: JSON.stringify(payload) });
      showToast("Appointment created");
    }

    // Only fire webhook for new future appointments — never for past dates
    const isCreate = !id;
    if (!isCreate || isFuture(apptUtc)) {
      fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          action:          id ? "updated" : "created",
          name:            payload.name,
          client_name:     payload.client_name,
          phone:           payload.phone,
          email:           payload.email,
          notes:           payload.notes,
          appointment_utc: payload.appointment_utc,
          timezone:        payload.timezone,
          appointment_id:  id || null
        })
      }).catch(err => console.warn("Webhook failed:", err));
    }

    closeModal("appt-modal");
    await loadAppointments();
  } catch (e) { console.error(e); showToast("Failed to save", "error"); }
  finally { showLoading(false); }
}

async function setDispo(dispo) {
  if (!detailEventId) return;
  showLoading(true);
  try {
    await sbFetch(`appointments?id=eq.${detailEventId}`, {
      method: "PATCH", prefer: "return=minimal",
      body: JSON.stringify({ dispo })
    });
    const appt = appointments.find(a => a.id === detailEventId);
    if (appt) appt.dispo = dispo;
    document.querySelectorAll(".dispo-btn").forEach(b => b.classList.toggle("active", b.dataset.d === dispo));
    document.getElementById("detail-dispo-badge").innerHTML = dispoBadgeHtml(dispo);
    showToast(`Marked as ${DISPO_LABELS[dispo]}`);
    render();
  } catch (e) { console.error(e); showToast("Failed to update status", "error"); }
  finally { showLoading(false); }
}

async function deleteAppointment() {
  const id = document.getElementById("edit-id").value;
  if (!id || !confirm("Delete this appointment?")) return;
  showLoading(true);
  try {
    await sbFetch(`appointments?id=eq.${id}`, { method: "DELETE", prefer: "return=minimal" });
    showToast("Appointment deleted");
    closeModal("appt-modal");
    await loadAppointments();
  } catch (e) { console.error(e); showToast("Failed to delete", "error"); }
  finally { showLoading(false); }
}

async function dragDropMove(apptId, targetDate) {
  const appt = appointments.find(a => a.id === apptId);
  if (!appt) return;
  const tz = appt.timezone || displayTz;
  const p  = dateParts(appt.appointment_utc, tz);
  const ds = `${targetDate.getFullYear()}-${String(targetDate.getMonth()+1).padStart(2,"0")}-${String(targetDate.getDate()).padStart(2,"0")}`;
  const ts = `${String(p.hour).padStart(2,"0")}:${String(p.minute).padStart(2,"0")}`;
  const newUtc = localToUtc(ds, ts, tz);

  showLoading(true);
  try {
    await sbFetch(`appointments?id=eq.${apptId}`, {
      method: "PATCH", prefer: "return=minimal",
      body: JSON.stringify({ appointment_utc: newUtc })
    });
    appt.appointment_utc = newUtc;
    showToast("Appointment moved");
    render();
  } catch (e) { console.error(e); showToast("Failed to move", "error"); }
  finally { showLoading(false); }
}

function navigate(dir) {
  if (currentView === "month" || currentView === "agenda")
    cursor.setMonth(cursor.getMonth() + dir);
  else if (currentView === "week")
    cursor.setDate(cursor.getDate() + dir * 7);
  else
    cursor.setDate(cursor.getDate() + dir);
  cursor = new Date(cursor);
  render();
}

function goToday() { cursor = new Date(); render(); }

function setView(v) {
  currentView = v;
  document.querySelectorAll(".view-tab").forEach(t => {
    const label = t.textContent.trim().toLowerCase();
    t.classList.toggle("active", label === v || (v === "agenda" && label === "all"));
  });
  render();
}

function onTzChange() { displayTz = document.getElementById("tz-select").value; render(); }

function render() {
  updateLabel();
  const main = document.getElementById("cal-main");
  if (currentView === "month")       renderMonth(main);
  else if (currentView === "week")   renderWeek(main);
  else if (currentView === "day")    renderDay(main);
  else                               renderAgenda(main);
}

function updateLabel() {
  const el = document.getElementById("period-label");
  if (currentView === "month" || currentView === "agenda") {
    el.textContent = cursor.toLocaleDateString("en-US", { month: "long", year: "numeric" });
  } else if (currentView === "week") {
    const s = weekStart(cursor), e = new Date(s); e.setDate(e.getDate() + 6);
    el.textContent = `${s.toLocaleDateString("en-US",{month:"short",day:"numeric"})} – ${e.toLocaleDateString("en-US",{month:"short",day:"numeric"})}, ${e.getFullYear()}`;
  } else {
    el.textContent = cursor.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" });
  }
}

function renderMonth(container) {
  const year = cursor.getFullYear(), month = cursor.getMonth();
  const today = new Date();
  const first = new Date(year, month, 1), last = new Date(year, month+1, 0);
  const offset = first.getDay();
  const days = [];
  for (let i = 0; i < offset; i++)         days.push({ date: new Date(year, month, i - offset + 1), other: true });
  for (let i = 1; i <= last.getDate(); i++) days.push({ date: new Date(year, month, i),              other: false });
  while (days.length < 42)                  days.push({ date: new Date(year, month+1, days.length - offset - last.getDate() + 1), other: true });

  container.innerHTML = `
    <div class="month-view">
      <div class="month-header">
        ${["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d => `<div class="month-dow">${d}</div>`).join("")}
      </div>
      <div class="month-grid" id="month-grid"></div>
    </div>`;
  const grid = document.getElementById("month-grid");

  days.forEach(({ date, other }) => {
    const isToday = date.toDateString() === today.toDateString();
    const cell = document.createElement("div");
    cell.className = `month-cell${other ? " other-month" : ""}${isToday ? " today" : ""}`;

    cell.addEventListener("click", e => {
      if (e.target === cell || e.target.classList.contains("cell-day")) openNewModal(date);
    });
    cell.addEventListener("dragover", e => { e.preventDefault(); cell.classList.add("drag-over"); });
    cell.addEventListener("dragleave", ()  => cell.classList.remove("drag-over"));
    cell.addEventListener("drop", e => {
      e.preventDefault();
      cell.classList.remove("drag-over");
      if (draggedApptId) { dragDropMove(draggedApptId, date); draggedApptId = null; }
    });

    const dayEl = document.createElement("div");
    dayEl.className = "cell-day";
    dayEl.textContent = date.getDate();
    cell.appendChild(dayEl);

    const dayEvts = appointments.filter(a => {
      const p = dateParts(a.appointment_utc, displayTz);
      return p.year === date.getFullYear() && p.month === date.getMonth()+1 && p.day === date.getDate();
    });

    dayEvts.slice(0, 3).forEach(ev => {
      const pill = document.createElement("div");
      pill.className = "event-pill";
      pill.style.background = dispoColor(ev.dispo || "pending");
      pill.draggable = true;
      pill.textContent = `${fmtTime(ev.appointment_utc, displayTz)} ${ev.name}`;
      pill.title       = `${ev.name}${ev.client_name ? ` — ${ev.client_name}` : ""}`;
      pill.addEventListener("dragstart", e => {
        draggedApptId = ev.id;
        pill.classList.add("dragging");
        e.dataTransfer.effectAllowed = "move";
      });
      pill.addEventListener("dragend", () => {
        pill.classList.remove("dragging");
        draggedApptId = null;
      });
      pill.addEventListener("click", e => { e.stopPropagation(); openDetail(ev); });
      cell.appendChild(pill);
    });

    if (dayEvts.length > 3) {
      const more = document.createElement("div");
      more.className = "more-events";
      more.textContent = `+${dayEvts.length - 3} more`;
      more.addEventListener("click", e => { e.stopPropagation(); cursor = new Date(date); setView("day"); });
      cell.appendChild(more);
    }
    grid.appendChild(cell);
  });
}

function renderWeek(container) {
  const start = weekStart(cursor), today = new Date();
  const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  let hdr = `<div class="week-gutter"></div>`;
  for (let i = 0; i < 7; i++) {
    const d = new Date(start); d.setDate(d.getDate() + i);
    const isT = d.toDateString() === today.toDateString();
    hdr += `<div class="week-header-day" onclick="cursor=new Date(${d.getTime()});setView('day')">
              <div class="week-header-dow">${DAYS[i]}</div>
              <div class="week-header-num${isT ? " today" : ""}">${d.getDate()}</div>
            </div>`;
  }

  container.innerHTML = `
    <div class="week-view">
      <div class="week-header-row">${hdr}</div>
      <div class="week-body"><div class="week-time-grid" id="wgrid"></div></div>
    </div>`;
  const grid = document.getElementById("wgrid");

  for (let h = 0; h < 24; h++) {
    const lbl = document.createElement("div");
    lbl.className = "week-hour-label";
    lbl.textContent = h === 0 ? "" : fmtHour(h);
    grid.appendChild(lbl);
    for (let d = 0; d < 7; d++) {
      const col  = document.createElement("div");
      col.className = "week-col";
      const line = document.createElement("div");
      line.className = "hour-line";
      col.appendChild(line);
      const date = new Date(start); date.setDate(date.getDate() + d);
      col.addEventListener("click", () => openNewModal(date, `${String(h).padStart(2,"0")}:00`));
      grid.appendChild(col);
    }
  }

  appointments.forEach(ev => {
    const p = dateParts(ev.appointment_utc, displayTz);
    for (let d = 0; d < 7; d++) {
      const date = new Date(start); date.setDate(date.getDate() + d);
      if (p.year === date.getFullYear() && p.month === date.getMonth()+1 && p.day === date.getDate()) {
        const col = grid.querySelectorAll(".week-col")[p.hour * 7 + d];
        if (col) {
          const color = dispoColor(ev.dispo || "pending");
          const el = document.createElement("div");
          el.style.cssText = `position:absolute;top:2px;left:2px;right:2px;background:${color};border-radius:5px;padding:3px 6px;font-size:11px;font-weight:500;color:#fff;overflow:hidden;cursor:pointer;z-index:2;`;
          el.innerHTML = `<div>${fmtTime(ev.appointment_utc, displayTz)}</div><div style="opacity:.9;">${ev.name}</div>`;
          col.style.position = "relative";
          col.appendChild(el);
          el.addEventListener("click", e => { e.stopPropagation(); openDetail(ev); });
        }
        break;
      }
    }
  });
}

function renderDay(container) {
  const isT = cursor.toDateString() === new Date().toDateString();
  container.innerHTML = `
    <div class="day-view">
      <div class="day-header">
        <h2 style="color:${isT ? "var(--primary)" : "var(--text)"}">
          ${cursor.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"})}
        </h2>
      </div>
      <div class="day-body">
        <div class="day-labels" id="day-labels"></div>
        <div class="day-col" id="day-col"></div>
      </div>
    </div>`;

  const labelsEl = document.getElementById("day-labels");
  const colEl    = document.getElementById("day-col");
  colEl.style.position = "relative";

  for (let h = 0; h < 24; h++) {
    const lbl = document.createElement("div");
    lbl.className = "day-label";
    lbl.textContent = h === 0 ? "" : fmtHour(h);
    labelsEl.appendChild(lbl);
    const row = document.createElement("div");
    row.className = "day-hour-row";
    row.addEventListener("click", () => openNewModal(cursor, `${String(h).padStart(2,"0")}:00`));
    colEl.appendChild(row);
  }

  appointments.filter(ev => {
    const p = dateParts(ev.appointment_utc, displayTz);
    return p.year === cursor.getFullYear() && p.month === cursor.getMonth()+1 && p.day === cursor.getDate();
  }).forEach(ev => {
    const p     = dateParts(ev.appointment_utc, displayTz);
    const color = dispoColor(ev.dispo || "pending");
    const el    = document.createElement("div");
    el.className        = "day-event";
    el.style.top        = `${(p.hour + p.minute/60) * 60}px`;
    el.style.background = color;
    el.innerHTML        = `<strong>${fmtTime(ev.appointment_utc, displayTz)}</strong> — ${ev.name}${ev.client_name ? ` (${ev.client_name})` : ""}`;
    el.addEventListener("click", e => { e.stopPropagation(); openDetail(ev); });
    colEl.appendChild(el);
  });
}

function renderAgenda(container) {
  const sorted = [...appointments].sort((a, b) => new Date(a.appointment_utc) - new Date(b.appointment_utc));

  if (!sorted.length) {
    container.innerHTML = `
      <div class="agenda-view">
        <div class="agenda-empty">
          <div class="agenda-empty-icon">📅</div>
          <div style="font-size:16px;font-weight:500;margin-bottom:8px;color:var(--text);">No appointments yet</div>
          <div>Click "+ New Appointment" to get started.</div>
        </div>
      </div>`;
    return;
  }

  const groups = {};
  sorted.forEach(ev => {
    const p   = dateParts(ev.appointment_utc, displayTz);
    const key = `${p.year}-${String(p.month).padStart(2,"0")}-${String(p.day).padStart(2,"0")}`;
    if (!groups[key]) groups[key] = { date: new Date(p.year, p.month-1, p.day), events: [] };
    groups[key].events.push(ev);
  });

  const today = new Date();
  const html  = Object.entries(groups).map(([, { date, events }]) => {
    const isT  = date.toDateString() === today.toDateString();
    const label = date.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" });
    const evHtml = events.map(ev => {
      const color  = dispoColor(ev.dispo || "pending");
      const dispo  = ev.dispo || "pending";
      const meta   = [ev.client_name, ev.phone].filter(Boolean).join(" · ");
      const dLabel = dispo !== "pending" ? `<span style="color:${color};font-weight:500;">${DISPO_LABELS[dispo]}</span>` : "";
      return `
        <div class="agenda-item" onclick="openDetailById('${ev.id}')">
          <div class="agenda-time">${fmtTime(ev.appointment_utc, displayTz)}</div>
          <div class="agenda-bar" style="background:${color};"></div>
          <div class="agenda-content">
            <div class="agenda-title">${ev.name}</div>
            <div class="agenda-meta">${[meta, dLabel].filter(Boolean).join(" · ")}</div>
          </div>
        </div>`;
    }).join("");
    return `
      <div class="agenda-date-group">
        <div class="agenda-date-header${isT ? " today" : ""}">
          <span class="agenda-date-num">${date.getDate()}</span>
          <span class="agenda-date-label">${label}</span>
        </div>
        ${evHtml}
      </div>`;
  }).join("");

  container.innerHTML = `<div class="agenda-view">${html}</div>`;
}

function openNewModal(date, time) {
  document.getElementById("modal-title").textContent = "New Appointment";
  document.getElementById("edit-id").value     = "";
  document.getElementById("appt-name").value   = "";
  document.getElementById("appt-client").value = "";
  document.getElementById("appt-phone").value  = "";
  document.getElementById("appt-email").value  = "";
  document.getElementById("appt-notes").value  = "";
  document.getElementById("delete-btn").style.display = "none";
  const d = date || new Date();
  document.getElementById("appt-date").value = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  document.getElementById("appt-time").value = time || "09:00";
  document.getElementById("appt-tz").value   = displayTz;
  openModal("appt-modal");
}

function openEditModal(ev) {
  document.getElementById("modal-title").textContent = "Edit Appointment";
  document.getElementById("edit-id").value     = ev.id;
  document.getElementById("appt-name").value   = ev.name        || "";
  document.getElementById("appt-client").value = ev.client_name || "";
  document.getElementById("appt-phone").value  = ev.phone       || "";
  document.getElementById("appt-email").value  = ev.email       || "";
  document.getElementById("appt-notes").value  = ev.notes       || "";
  document.getElementById("delete-btn").style.display = "inline-flex";
  const tz = ev.timezone || displayTz;
  const p  = dateParts(ev.appointment_utc, tz);
  document.getElementById("appt-date").value = `${p.year}-${String(p.month).padStart(2,"0")}-${String(p.day).padStart(2,"0")}`;
  document.getElementById("appt-time").value = `${String(p.hour).padStart(2,"0")}:${String(p.minute).padStart(2,"0")}`;
  document.getElementById("appt-tz").value   = tz;
  closeModal("detail-modal");
  openModal("appt-modal");
}

function openDetail(ev) {
  detailEventId = ev.id;
  const dispo   = ev.dispo || "pending";
  document.getElementById("detail-name").textContent = ev.name;
  document.getElementById("detail-dispo-badge").innerHTML     = dispoBadgeHtml(dispo);
  document.getElementById("detail-client").textContent        = ev.client_name || "—";
  document.getElementById("detail-phone").textContent         = ev.phone       || "—";
  document.getElementById("detail-email").textContent         = ev.email       || "—";
  const tz = ev.timezone || displayTz;
  document.getElementById("detail-datetime").textContent =
    `${fmtDate(ev.appointment_utc, tz)} at ${fmtTime(ev.appointment_utc, tz)} ${tzAbbr(tz)}`;
  document.getElementById("detail-notes").textContent = ev.notes || "—";
  document.querySelectorAll(".dispo-btn").forEach(b => b.classList.toggle("active", b.dataset.d === dispo));
  openModal("detail-modal");
}

function openDetailById(id) {
  const ev = appointments.find(a => a.id === id);
  if (ev) openDetail(ev);
}

function openEditFromDetail() {
  const ev = appointments.find(a => a.id === detailEventId);
  if (ev) openEditModal(ev);
}

function openModal(id)  { document.getElementById(id).classList.add("open"); }
function closeModal(id) { document.getElementById(id).classList.remove("open"); }

document.querySelectorAll(".modal-backdrop").forEach(el => {
  el.addEventListener("click", e => { if (e.target === el) el.classList.remove("open"); });
});

function showToast(msg, type = "") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className   = `toast${type ? " " + type : ""} show`;
  setTimeout(() => t.classList.remove("show"), 3200);
}

function showLoading(v) {
  document.getElementById("loading").classList.toggle("show", v);
}

(function init() {
  const sel = document.getElementById("tz-select");
  const btz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  if ([...sel.options].some(o => o.value === btz)) { sel.value = btz; displayTz = btz; }
  render();
  loadAppointments();
})();
</script>
</body>
</html>
