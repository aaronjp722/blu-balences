<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Control — Blu Balence</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#1a56db;--blue-dark:#1141a8;--blue-light:#e8f0fe;--gray:#6b7280;--gray-light:#f3f4f6;--border:#e5e7eb;--text:#111827;--green:#10b981;--red:#ef4444;--yellow:#f59e0b}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray-light);color:var(--text);height:100vh;overflow:hidden}
#config-screen{position:fixed;inset:0;background:var(--gray-light);display:flex;align-items:center;justify-content:center;z-index:200}
#config-screen .box{background:#fff;border-radius:12px;padding:32px;width:440px;box-shadow:0 4px 24px rgba(0,0,0,.1)}
#config-screen h1{font-size:22px;font-weight:700;margin-bottom:6px}
#config-screen .sub{color:var(--gray);font-size:14px;margin-bottom:24px}
#app{display:none;width:100%;height:100vh;flex-direction:row}
#app.show{display:flex}
#sidebar{width:220px;background:var(--blue);color:#fff;display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:24px 20px 20px;font-weight:700;font-size:16px;border-bottom:1px solid rgba(255,255,255,.1)}
.logo span{opacity:.7;display:block;font-size:12px;font-weight:400;margin-top:2px}
nav{padding:12px 0;flex:1}
nav a{display:flex;align-items:center;gap:10px;padding:10px 20px;color:rgba(255,255,255,.8);text-decoration:none;font-size:14px;cursor:pointer;transition:background .15s}
nav a:hover,nav a.active{background:rgba(255,255,255,.15);color:#fff}
nav a.active{font-weight:600}
nav a svg{width:18px;height:18px;flex-shrink:0}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:#fff;border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
#topbar h1{font-size:18px;font-weight:600}
#content{flex:1;overflow-y:auto;padding:24px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px}
.card{background:#fff;border-radius:10px;padding:20px;border:1px solid var(--border)}
.card .label{font-size:12px;color:var(--gray);text-transform:uppercase;letter-spacing:.05em}
.card .value{font-size:28px;font-weight:700;margin-top:6px}
.card .sub{font-size:12px;color:var(--gray);margin-top:4px}
.panel{background:#fff;border-radius:10px;border:1px solid var(--border);overflow:hidden;margin-bottom:20px}
.panel-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.panel-header h2{font-size:15px;font-weight:600}
table{width:100%;border-collapse:collapse}
th{padding:10px 16px;text-align:left;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--gray);background:var(--gray-light)}
td{padding:12px 16px;font-size:14px;border-top:1px solid var(--border)}
tr:hover td{background:#fafafa}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:7px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:var(--blue);color:#fff}
.btn-secondary{background:var(--gray-light);color:var(--text);border:1px solid var(--border)}
.btn-danger{background:var(--red);color:#fff}
.btn-ghost{background:none;color:var(--blue);border:1px solid var(--blue)}
.btn-sm{padding:5px 10px;font-size:12px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:500;margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:7px;font-size:14px;outline:none;transition:border-color .15s;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--blue)}
.form-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:12px;padding:24px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal h2{font-size:18px;font-weight:600;margin-bottom:20px}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:20px;border-top:1px solid var(--border)}
.badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:12px;font-weight:500}
.badge-green{background:#d1fae5;color:#065f46}
.badge-gray{background:#f3f4f6;color:#6b7280}
.badge-yellow{background:#fef3c7;color:#92400e}
.badge-red{background:#fee2e2;color:#991b1b}
.badge-blue{background:var(--blue-light);color:var(--blue-dark)}
.toggle{position:relative;width:40px;height:22px;display:inline-block}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#d1d5db;border-radius:22px;cursor:pointer;transition:background .2s}
.toggle input:checked+.toggle-slider{background:var(--blue)}
.toggle-slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle input:checked+.toggle-slider:before{transform:translateX(18px)}
.empty{text-align:center;padding:40px;color:var(--gray);font-size:14px}
.actions{display:flex;gap:6px}
.step-card{background:var(--gray-light);border-radius:8px;padding:14px 16px;margin-bottom:10px;border:1px solid var(--border)}
.step-card-header{display:flex;align-items:center;justify-content:space-between}
.step-num{background:var(--blue);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.step-meta{font-size:12px;color:var(--gray);margin-top:4px}
.step-body-preview{font-size:12px;color:#374151;margin-top:4px;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:400px}
textarea{resize:vertical;min-height:80px}
.section-title{font-size:13px;font-weight:600;margin:16px 0 8px;color:var(--gray);text-transform:uppercase;letter-spacing:.04em}
.hint{font-size:12px;color:var(--gray);margin-top:4px}
.tag-pill{display:inline-block;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:500;background:var(--blue-light);color:var(--blue-dark);margin-right:4px;margin-top:3px}
.test-result{padding:14px 16px;border-radius:8px;font-size:14px;margin-top:16px;display:none}
.test-result.success{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7}
.test-result.error{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
</style>
</head>
<body>

<div id="config-screen">
  <div class="box">
    <h1>Email Control</h1>
    <p class="sub">Connect your Supabase project to get started. Find these in Supabase → Project Settings → API.</p>
    <div class="form-group"><label>Supabase Project URL</label><input id="cfg-url" type="url" placeholder="https://xxxx.supabase.co"></div>
    <div class="form-group"><label>Supabase Service Role Key</label><input id="cfg-key" type="text" placeholder="eyJ..."></div>
    <button class="btn btn-primary" style="width:100%" onclick="saveConfig()">Connect</button>
  </div>
</div>

<div id="app">
  <div id="sidebar">
    <div class="logo">Blu Balence<span>Email Control</span></div>
    <nav>
      <a onclick="navigate('dashboard')" id="nav-dashboard">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Dashboard
      </a>
      <a onclick="navigate('sequences')" id="nav-sequences">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
        Sequences
      </a>
      <a onclick="navigate('subscribers')" id="nav-subscribers">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Subscribers
      </a>
      <a onclick="navigate('analytics')" id="nav-analytics">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        Analytics
      </a>
      <a onclick="navigate('testemail')" id="nav-testemail">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        Test Email
      </a>
      <a onclick="navigate('settings')" id="nav-settings">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Settings
      </a>
    </nav>
  </div>
  <div id="main">
    <div id="topbar">
      <h1 id="page-title">Dashboard</h1>
      <div id="topbar-actions"></div>
    </div>
    <div id="content"></div>
  </div>
</div>
<div id="modals"></div>

<script>
let sb;

function saveConfig() {
  const url = document.getElementById('cfg-url').value.trim();
  const key = document.getElementById('cfg-key').value.trim();
  if (!url || !key) { alert('Both fields are required'); return; }
  localStorage.setItem('sb_url', url);
  localStorage.setItem('sb_key', key);
  boot(url, key);
}

function boot(url, key) {
  sb = supabase.createClient(url, key);
  document.getElementById('config-screen').style.display = 'none';
  document.getElementById('app').classList.add('show');
  navigate('dashboard');
}

async function navigate(tab) {
  document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
  const el = document.getElementById('nav-' + tab);
  if (el) el.classList.add('active');
  document.getElementById('page-title').textContent =
    { dashboard: 'Dashboard', sequences: 'Sequences', subscribers: 'Subscribers', analytics: 'Analytics', testemail: 'Test Email', settings: 'Settings' }[tab];
  document.getElementById('topbar-actions').innerHTML = '';
  document.getElementById('content').innerHTML = '<div style="padding:40px;text-align:center;color:#6b7280">Loading…</div>';
  if (tab === 'dashboard') await renderDashboard();
  else if (tab === 'sequences') await renderSequences();
  else if (tab === 'subscribers') await renderSubscribers();
  else if (tab === 'analytics') await renderAnalytics();
  else if (tab === 'testemail') await renderTestEmail();
  else if (tab === 'settings') await renderSettings();
}

function cfgVal(v) { return typeof v === 'string' ? v.replace(/^"|"$/g, '') : (v || ''); }

async function renderDashboard() {
  const [{ data: seqs }, { data: enrs }, { data: logs }] = await Promise.all([
    sb.from('sequences').select('id,active'),
    sb.from('enrollments').select('status'),
    sb.from('send_log').select('id,sent_at').order('sent_at', { ascending: false }).limit(200),
  ]);
  const today = new Date().toDateString();
  const sentToday = (logs || []).filter(l => new Date(l.sent_at).toDateString() === today).length;
  document.getElementById('content').innerHTML = `
    <div class="cards">
      <div class="card"><div class="label">Active Sequences</div><div class="value" style="color:var(--blue)">${(seqs||[]).filter(s=>s.active).length}</div><div class="sub">${(seqs||[]).length} total</div></div>
      <div class="card"><div class="label">Active Enrollments</div><div class="value">${(enrs||[]).filter(e=>e.status==='active').length}</div><div class="sub">${(enrs||[]).filter(e=>e.status==='completed').length} completed</div></div>
      <div class="card"><div class="label">Sent Today</div><div class="value" style="color:var(--green)">${sentToday}</div><div class="sub">emails</div></div>
      <div class="card"><div class="label">Total Sent</div><div class="value">${(logs||[]).length}</div><div class="sub">all time</div></div>
    </div>
    <div class="panel" style="margin-bottom:20px">
      <div class="panel-header"><h2>Send Drip Emails</h2></div>
      <div style="padding:20px">
        <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
          <button class="btn btn-primary" id="send-btn" onclick="sendNow()">&#9654; Send Now</button>
          <span id="send-status" style="font-size:14px;color:var(--gray)"></span>
        </div>
        <div id="run-status-box" style="margin-top:16px;display:none;background:var(--gray-light);border-radius:8px;padding:14px 16px;font-size:13px">
          <div style="display:flex;align-items:center;gap:10px">
            <span id="run-status-dot" style="width:10px;height:10px;border-radius:50%;flex-shrink:0;background:#d1d5db"></span>
            <div>
              <div id="run-status-text" style="font-weight:600">Checking…</div>
              <div id="run-status-time" style="color:var(--gray);margin-top:2px"></div>
            </div>
            <a id="run-status-link" href="#" target="_blank" style="margin-left:auto;font-size:12px;color:var(--blue)">View on GitHub →</a>
          </div>
        </div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <h2>Recent Activity</h2>
        <button class="btn btn-secondary btn-sm" onclick="refreshLog()">Refresh</button>
      </div>
      <div id="recent-log"><div class="empty">Loading…</div></div>
    </div>`;
  await refreshLog();
  checkRunStatus();
}

async function refreshLog() {
  const { data: recent } = await sb.from('send_log')
    .select('sent_at,step_number,brevo_message_id,enrollments(email,sequences(name))')
    .order('sent_at', { ascending: false }).limit(20);
  document.getElementById('recent-log').innerHTML = !recent || !recent.length
    ? '<div class="empty">No sends yet. Create a sequence and enroll subscribers.</div>'
    : `<table><thead><tr><th>Sent At</th><th>Email</th><th>Sequence</th><th>Step</th><th>Message ID</th></tr></thead><tbody>
      ${recent.map(l=>`<tr>
        <td>${new Date(l.sent_at).toLocaleString()}</td>
        <td>${l.enrollments?.email||'—'}</td>
        <td>${l.enrollments?.sequences?.name||'—'}</td>
        <td>Step ${l.step_number}</td>
        <td style="font-size:11px;color:var(--gray)">${l.brevo_message_id||'—'}</td>
      </tr>`).join('')}</tbody></table>`;
}

async function checkRunStatus(poll) {
  const { data: rows } = await sb.from('settings').select('key,value');
  const cfg = Object.fromEntries((rows||[]).map(r => [r.key, cfgVal(r.value)]));
  const token = cfg.github_token;
  const repo = cfg.github_repo;
  if (!token || !repo) return;

  const box = document.getElementById('run-status-box');
  const dot = document.getElementById('run-status-dot');
  const text = document.getElementById('run-status-text');
  const time = document.getElementById('run-status-time');
  const link = document.getElementById('run-status-link');
  if (!box) return;

  try {
    const r = await fetch(`https://api.github.com/repos/${repo}/actions/workflows/drip.yml/runs?per_page=1`, {
      headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' }
    });
    const data = await r.json();
    const run = data.workflow_runs?.[0];
    if (!run) { box.style.display = 'none'; return; }

    box.style.display = 'block';
    link.href = run.html_url;
    const started = new Date(run.created_at).toLocaleString();

    if (run.status === 'in_progress' || run.status === 'queued') {
      dot.style.background = '#f59e0b';
      text.textContent = run.status === 'queued' ? 'Queued — starting soon…' : 'Running — emails sending now…';
      time.textContent = `Started ${started}`;
      if (poll !== false) setTimeout(() => checkRunStatus(true), 10000);
    } else if (run.conclusion === 'success') {
      dot.style.background = '#10b981';
      text.textContent = 'Completed successfully';
      time.textContent = `Finished ${new Date(run.updated_at).toLocaleString()}`;
      if (poll) refreshLog();
    } else if (run.conclusion === 'failure') {
      dot.style.background = '#ef4444';
      text.textContent = 'Run failed — check GitHub Actions for details';
      time.textContent = `Failed ${new Date(run.updated_at).toLocaleString()}`;
    } else {
      dot.style.background = '#d1d5db';
      text.textContent = `Last run: ${run.conclusion || run.status}`;
      time.textContent = started;
    }
  } catch(e) {
    box.style.display = 'none';
  }
}

async function sendNow() {
  const btn = document.getElementById('send-btn');
  const status = document.getElementById('send-status');
  btn.disabled = true;
  status.textContent = 'Triggering…';
  status.style.color = 'var(--gray)';

  const { data: rows } = await sb.from('settings').select('key,value');
  const cfg = Object.fromEntries((rows||[]).map(r => [r.key, cfgVal(r.value)]));
  const token = cfg.github_token;
  const repo = cfg.github_repo;

  if (!token || !repo) {
    status.textContent = 'GitHub token and repo not set in Settings.';
    status.style.color = 'var(--red)';
    btn.disabled = false;
    return;
  }

  try {
    const r = await fetch(`https://api.github.com/repos/${repo}/actions/workflows/drip.yml/dispatches`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ ref: 'main' }),
    });
    if (r.status === 204) {
      status.textContent = '✓ Triggered!';
      status.style.color = 'var(--green)';
      setTimeout(() => checkRunStatus(true), 3000);
    } else {
      const err = await r.json();
      status.textContent = 'Error: ' + (err.message || r.status);
      status.style.color = 'var(--red)';
    }
  } catch (e) {
    status.textContent = 'Failed: ' + e.message;
    status.style.color = 'var(--red)';
  }
  btn.disabled = false;
}

async function renderSequences() {
  const { data: seqs } = await sb.from('sequences').select('*').order('created_at');
  document.getElementById('topbar-actions').innerHTML = `<button class="btn btn-primary" onclick="openSeqModal()">+ New Sequence</button>`;
  document.getElementById('content').innerHTML = `
    <div class="panel">
      <div class="panel-header"><h2>Sequences</h2></div>
      ${!seqs||!seqs.length ? '<div class="empty">No sequences yet. Create one to get started.</div>' :
      `<table><thead><tr><th>Name</th><th>Description</th><th>Active</th><th>Actions</th></tr></thead><tbody>
      ${seqs.map(s=>`<tr>
        <td><strong>${s.name}</strong></td>
        <td style="color:var(--gray)">${s.description||'—'}</td>
        <td><label class="toggle"><input type="checkbox" ${s.active?'checked':''} onchange="toggleSeq('${s.id}',this.checked)"><span class="toggle-slider"></span></label></td>
        <td><div class="actions">
          <button class="btn btn-secondary btn-sm" onclick="openStepsModal('${s.id}','${esc(s.name)}')">Steps</button>
          <button class="btn btn-secondary btn-sm" onclick="openSeqModal('${s.id}','${esc(s.name)}','${esc(s.description||'')}')">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteSeq('${s.id}')">Delete</button>
        </div></td>
      </tr>`).join('')}</tbody></table>`}
    </div>`;
}

async function toggleSeq(id, active) {
  await sb.from('sequences').update({ active }).eq('id', id);
}

async function deleteSeq(id) {
  if (!confirm('Delete this sequence and all enrollments?')) return;
  await sb.from('sequences').delete().eq('id', id);
  renderSequences();
}

function openSeqModal(id, name, desc) {
  showModal(`
    <h2>${id ? 'Edit' : 'New'} Sequence</h2>
    <div class="form-group"><label>Name</label><input id="sq-name" value="${name||''}"></div>
    <div class="form-group"><label>Description</label><textarea id="sq-desc">${desc||''}</textarea></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveSeq('${id||''}')">Save</button>
    </div>`);
}

async function saveSeq(id) {
  const name = document.getElementById('sq-name').value.trim();
  const description = document.getElementById('sq-desc').value.trim();
  if (!name) { alert('Name required'); return; }
  if (id) await sb.from('sequences').update({ name, description }).eq('id', id);
  else await sb.from('sequences').insert({ name, description, active: true });

function delay(s) {
  const parts = [s.delay_days>0?`${s.delay_days}d`:'', s.delay_hours>0?`${s.delay_hours}h`:'', s.delay_minutes>0?`${s.delay_minutes}m`:''].filter(Boolean);
  return parts.length ? parts.join(' ') : 'Immediately';
}

function stepCard(s) {
  const batchLimit = s.batch_limit > 0 ? s.batch_limit : null;
  const interval = s.batch_interval_minutes > 0 ? s.batch_interval_minutes : null;
  const batchText = batchLimit
    ? `Batch: ${batchLimit} emails${interval ? `, ${interval} min apart` : ''}`
    : (interval ? `${interval} min between emails` : 'No batch limit');
  const tagPills = s.tags ? s.tags.split(',').map(t => t.trim()).filter(Boolean).map(t => `<span class="tag-pill">${t}</span>`).join('') : '';
  const bodyPreview = s.body ? s.body.replace(/<[^>]+>/g, '').trim().substring(0, 80) + (s.body.length > 80 ? '…' : '') : '';
  return `<div class="step-card">
    <div class="step-card-header">
      <div style="display:flex;align-items:flex-start;gap:10px;flex:1;min-width:0">
        <div class="step-num" style="margin-top:2px">${s.step_number}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:600">${s.subject}</div>
          <div class="step-meta">Wait: ${delay(s)} · ${s.from_email}</div>
          ${bodyPreview ? `<div class="step-body-preview">"${bodyPreview}"</div>` : ''}
          <div class="step-meta" style="margin-top:4px">${batchText}</div>
          ${tagPills ? `<div style="margin-top:5px">${tagPills}</div>` : ''}
        </div>
      </div>
      <div class="actions" style="flex-shrink:0;margin-left:10px">
        <button class="btn btn-secondary btn-sm" onclick="openStepForm('${s.sequence_id}','_',${s.step_number},'${s.id}')">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteStep('${s.id}','${s.sequence_id}')">×</button>
      </div>
    </div>
  </div>`;
}

async function saveStep(seqId, seqName, stepNum, stepId) {
  const payload = {
    sequence_id: seqId,
    step_number: stepNum,
    subject: document.getElementById('st-subj').value.trim(),
    from_email: document.getElementById('st-from').value.trim(),
    template_id: 1,
    delay_days: parseInt(document.getElementById('st-days').value) || 0,
    delay_hours: parseInt(document.getElementById('st-hours').value) || 0,
    delay_minutes: parseInt(document.getElementById('st-mins').value) || 0,
    body: document.getElementById('st-body').value,
    batch_limit: parseInt(document.getElementById('st-batch').value) || 0,
    batch_interval_minutes: parseInt(document.getElementById('st-interval').value) || 0,
    tags: document.getElementById('st-tags').value.trim(),
  };
  if (!payload.subject || !payload.from_email) { alert('Subject and From email are required'); return; }
  let error;
  if (stepId) ({ error } = await sb.from('steps').update(payload).eq('id', stepId));
  else ({ error } = await sb.from('steps').insert(payload));
  if (error) { alert('Save failed: ' + error.message); return; }
  openStepsModal(seqId, seqName);
}

async function sendTestEmail() {
  const btn = document.getElementById('te-btn');
  const statusEl = document.getElementById('te-status');
  const resultEl = document.getElementById('te-result');

  const to = document.getElementById('te-to').value.trim();
  const fromRaw = document.getElementById('te-from').value.trim();
  const subject = document.getElementById('te-subject').value.trim();
  const body = document.getElementById('te-body').value.trim();

  if (!to || !subject || !body) {
    statusEl.textContent = 'To, Subject, and Body are required.';
    statusEl.style.color = 'var(--red)';
    return;
  }

  // Parse "Name <email>" or plain email
  const fromMatch = fromRaw.match(/^(.+?)\s*<(.+?)>$/);
  const fromName = fromMatch ? fromMatch[1].trim() : '';
  const fromEmail = fromMatch ? fromMatch[2].trim() : fromRaw;

  // Get Brevo API key
  const { data: rows } = await sb.from('settings').select('key,value');
  const cfg = Object.fromEntries((rows||[]).map(r => [r.key, cfgVal(r.value)]));
  const apiKey = cfg.brevo_api_key;

  if (!apiKey) {
    statusEl.textContent = 'Brevo API key not set. Go to Settings first.';
    statusEl.style.color = 'var(--red)';
    return;
  }

  btn.disabled = true;
  statusEl.textContent = 'Sending…';
  statusEl.style.color = 'var(--gray)';
  resultEl.style.display = 'none';

  const isHtml = body.trim().startsWith('<');
  const payload = {
    sender: { name: fromName || 'Blu Balence', email: fromEmail },
    to: [{ email: to }],
    subject,
    ...(isHtml ? { htmlContent: body } : { textContent: body }),
  };

  try {
    const res = await fetch('https://api.brevo.com/v3/smtp/email', {
      method: 'POST',
      headers: {
        'api-key': apiKey,
        'Content-Type': 'application/json',
        'Accept': 'application/json',
      },
      body: JSON.stringify(payload),
    });

    const json = await res.json();

    if (res.ok && json.messageId) {
      statusEl.textContent = '';
      resultEl.className = 'test-result success';
      resultEl.textContent = `✓ Sent successfully. Message ID: ${json.messageId}`;
      resultEl.style.display = 'block';

      // Log to test_send_log table (create if needed — won't error if table missing)
      await sb.from('test_send_log').insert({
        to_email: to,
        from_email: fromEmail,
        subject,
        status: 'sent',
        message_id: json.messageId,
        sent_at: new Date().toISOString(),
      }).then(() => refreshTestLog()).catch(() => {});

    } else {
      statusEl.textContent = '';
      resultEl.className = 'test-result error';
      resultEl.textContent = `✗ Failed: ${json.message || JSON.stringify(json)}`;
      resultEl.style.display = 'block';

      await sb.from('test_send_log').insert({
        to_email: to,
        from_email: fromEmail,
        subject,
        status: 'failed',
        message_id: null,
        sent_at: new Date().toISOString(),
      }).then(() => refreshTestLog()).catch(() => {});
    }
  } catch (e) {
    statusEl.textContent = '';
    resultEl.className = 'test-result error';
    resultEl.textContent = `✗ Request failed: ${e.message}`;
    resultEl.style.display = 'block';
  }

  btn.disabled = false;
}

  const o = document.createElement('div');
  o.className = 'modal-overlay';
  o.innerHTML = `<div class="modal" style="${wide?'width:720px':''}">${html}</div>`;
  o.addEventListener('click', e => { if (e.target === o) closeModal(); });
  document.getElementById('modals').innerHTML = '';
  document.getElementById('modals').appendChild(o);
}
function closeModal() { document.getElementById('modals').innerHTML = ''; }
function esc(s) { return (s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

(function() {
  const url = localStorage.getItem('sb_url');
  const key = localStorage.getItem('sb_key');
  if (url && key) boot(url, key);
})();
</script>
