<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Control — Blu Balence</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#1a56db;--blue-dark:#1141a8;--blue-light:#e8f0fe;--gray:#6b7280;--gray-light:#f3f4f6;--border:#e5e7eb;--text:#111827;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--purple:#8b5cf6;--orange:#f97316}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray-light);color:var(--text);height:100vh;overflow:hidden}
#config-screen{position:fixed;inset:0;background:var(--gray-light);display:flex;align-items:center;justify-content:center;z-index:200}
#config-screen .box{background:#fff;border-radius:12px;padding:32px;width:440px;box-shadow:0 4px 24px rgba(0,0,0,.1)}
#config-screen h1{font-size:22px;font-weight:700;margin-bottom:6px}
#config-screen .sub{color:var(--gray);font-size:14px;margin-bottom:24px}
#app{display:none;width:100%;height:100vh;flex-direction:row}
#app.show{display:flex}
#sidebar{width:220px;background:var(--blue);color:#fff;display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:24px 20px 20px;font-weight:700;font-size:16px;border-bottom:1px solid rgba(255,255,255,.1)}
.logo span{opacity:.7;display:block;font-size:12px;font-weight:400;margin-top:2px}
nav{padding:12px 0;flex:1}
nav a{display:flex;align-items:center;gap:10px;padding:10px 20px;color:rgba(255,255,255,.8);text-decoration:none;font-size:14px;cursor:pointer;transition:background .15s}
nav a:hover,nav a.active{background:rgba(255,255,255,.15);color:#fff}
nav a.active{font-weight:600}
nav a svg{width:18px;height:18px;flex-shrink:0}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:#fff;border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
#topbar h1{font-size:18px;font-weight:600}
#content{flex:1;overflow-y:auto;padding:24px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px}
.card{background:#fff;border-radius:10px;padding:20px;border:1px solid var(--border)}
.card .label{font-size:12px;color:var(--gray);text-transform:uppercase;letter-spacing:.05em}
.card .value{font-size:28px;font-weight:700;margin-top:6px}
.card .sub{font-size:12px;color:var(--gray);margin-top:4px}
.panel{background:#fff;border-radius:10px;border:1px solid var(--border);overflow:hidden;margin-bottom:20px}
.panel-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.panel-header h2{font-size:15px;font-weight:600}
table{width:100%;border-collapse:collapse}
th{padding:10px 16px;text-align:left;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--gray);background:var(--gray-light)}
td{padding:12px 16px;font-size:14px;border-top:1px solid var(--border)}
tr:hover td{background:#fafafa}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:7px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:var(--blue);color:#fff}
.btn-secondary{background:var(--gray-light);color:var(--text);border:1px solid var(--border)}
.btn-danger{background:var(--red);color:#fff}
.btn-ghost{background:none;color:var(--blue);border:1px solid var(--blue)}
.btn-sm{padding:5px 10px;font-size:12px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:500;margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:7px;font-size:14px;outline:none;transition:border-color .15s;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--blue)}
.form-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:12px;padding:24px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal h2{font-size:18px;font-weight:600;margin-bottom:20px}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:20px;border-top:1px solid var(--border)}
.badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:12px;font-weight:500}
.badge-green{background:#d1fae5;color:#065f46}
.badge-gray{background:#f3f4f6;color:#6b7280}
.badge-yellow{background:#fef3c7;color:#92400e}
.badge-red{background:#fee2e2;color:#991b1b}
.badge-blue{background:var(--blue-light);color:var(--blue-dark)}
.badge-purple{background:#ede9fe;color:#5b21b6}
.badge-orange{background:#ffedd5;color:#9a3412}
.toggle{position:relative;width:40px;height:22px;display:inline-block}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#d1d5db;border-radius:22px;cursor:pointer;transition:background .2s}
.toggle input:checked+.toggle-slider{background:var(--blue)}
.toggle-slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle input:checked+.toggle-slider:before{transform:translateX(18px)}
.empty{text-align:center;padding:40px;color:var(--gray);font-size:14px}
.actions{display:flex;gap:6px;flex-wrap:wrap}
.step-card{background:var(--gray-light);border-radius:8px;padding:14px 16px;margin-bottom:10px;border:1px solid var(--border)}
.step-card-header{display:flex;align-items:center;justify-content:space-between}
.step-num{background:var(--blue);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.step-meta{font-size:12px;color:var(--gray);margin-top:4px}
.step-body-preview{font-size:12px;color:#374151;margin-top:4px;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:400px}
textarea{resize:vertical;min-height:80px}
.section-title{font-size:13px;font-weight:600;margin:16px 0 8px;color:var(--gray);text-transform:uppercase;letter-spacing:.04em}
.hint{font-size:12px;color:var(--gray);margin-top:4px}
.tag-pill{display:inline-block;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:500;background:var(--blue-light);color:var(--blue-dark);margin-right:4px;margin-top:3px}
.test-result{padding:14px 16px;border-radius:8px;font-size:14px;margin-top:16px;display:none}
.test-result.success{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7}
.test-result.error{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
.countdown-box{background:linear-gradient(135deg,#1a56db,#1141a8);border-radius:10px;padding:20px 24px;color:#fff;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.countdown-time{font-size:32px;font-weight:800;letter-spacing:-1px;font-variant-numeric:tabular-nums}
.countdown-label{font-size:12px;opacity:.75;text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.priority-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600}
.priority-later{background:#fef3c7;color:#92400e}
.priority-seq{background:#e0e7ff;color:#3730a3}
.tab-bar{display:flex;gap:2px;background:var(--gray-light);border-radius:8px;padding:3px;margin-bottom:20px;width:fit-content;border:1px solid var(--border)}
.tab-btn{padding:7px 18px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--gray);transition:all .15s;font-family:inherit}
.tab-btn.active{background:#fff;color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1);font-weight:600}
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;padding:14px 16px;background:#fff;border:1px solid var(--border);border-radius:10px;margin-bottom:16px}
.fg{display:flex;align-items:center;gap:6px}
.fg label{font-size:12px;font-weight:600;color:var(--gray);white-space:nowrap}
.fg select,.fg input[type=text]{padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:#fff;font-family:inherit;outline:none}
.fg select:focus,.fg input:focus{border-color:var(--blue)}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
.stat-card .sv{font-size:26px;font-weight:800;margin-bottom:3px;font-variant-numeric:tabular-nums;line-height:1}
.stat-card .sl{font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.05em}
.stat-card .ss{font-size:11px;color:var(--gray);margin-top:3px}
.days-grid{display:flex;gap:6px;flex-wrap:wrap}
.day-chip{display:inline-flex;align-items:center;justify-content:center;width:48px;height:36px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;user-select:none;transition:all .15s;background:#fff;color:var(--gray)}
.day-chip.on{background:var(--blue);border-color:var(--blue);color:#fff}
.account-card{background:var(--gray-light);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.account-info{flex:1;min-width:0}
.account-name{font-size:14px;font-weight:600}
.account-meta{font-size:12px;color:var(--gray);margin-top:2px}
.info-banner{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:12px 16px;font-size:13px;color:#1e40af;margin-bottom:16px}
.warn-banner{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:12px 16px;font-size:13px;color:#92400e;margin-bottom:16px}
</style>
</head>
<body>

<div id="config-screen">
  <div class="box">
    <h1>Email Control</h1>
    <p class="sub">Connect your Supabase project to get started. Find these in Supabase → Project Settings → API.</p>
    <div class="form-group"><label>Supabase Project URL</label><input id="cfg-url" type="url" placeholder="https://xxxx.supabase.co"></div>
    <div class="form-group"><label>Supabase Service Role Key</label><input id="cfg-key" type="text" placeholder="eyJ..."></div>
    <button class="btn btn-primary" style="width:100%" onclick="saveConfig()">Connect</button>
  </div>
</div>

<div id="app">
  <div id="sidebar">
    <div class="logo">Blu Balence<span>Email Control</span></div>
    <nav>
      <a onclick="navigate('dashboard')" id="nav-dashboard">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Dashboard
      </a>
      <a onclick="navigate('sequences')" id="nav-sequences">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
        Sequences
      </a>
      <a onclick="navigate('subscribers')" id="nav-subscribers">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Subscribers
      </a>
      <a onclick="navigate('analytics')" id="nav-analytics">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        Analytics
      </a>
      <a onclick="navigate('testemail')" id="nav-testemail">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        Test Email
      </a>
      <a onclick="navigate('settings')" id="nav-settings">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Settings
      </a>
    </nav>
  </div>
  <div id="main">
    <div id="topbar">
      <h1 id="page-title">Dashboard</h1>
      <div id="topbar-actions"></div>
    </div>
    <div id="content"></div>
  </div>
</div>
<div id="modals"></div>

<script>
let sb;
let countdownInterval = null;
let currentSubTab = 'contacts';
let aF = { days: '30', seqId: '', status: '', search: '' };

const BADGE_CLASS = {
  opened:'badge-green', unique_opened:'badge-green', first_opening:'badge-green',
  clicked:'badge-purple',
  hard_bounce:'badge-yellow', soft_bounce:'badge-yellow',
  spam:'badge-red', blocked:'badge-red', invalid:'badge-red', error:'badge-red',
  deferred:'badge-gray', unsubscribe:'badge-gray', sent:'badge-gray',
  proxy:'badge-blue', delivered:'badge-green',
};

function saveConfig() {
  const url = document.getElementById('cfg-url').value.trim();
  const key = document.getElementById('cfg-key').value.trim();
  if (!url || !key) { alert('Both fields are required'); return; }
  localStorage.setItem('sb_url', url);
  localStorage.setItem('sb_key', key);
  boot(url, key);
}

function boot(url, key) {
  sb = supabase.createClient(url, key);
  document.getElementById('config-screen').style.display = 'none';
  document.getElementById('app').classList.add('show');
  navigate('dashboard');
}

function cfgVal(v) { return typeof v === 'string' ? v.replace(/^"|"$/g, '') : (v || ''); }

async function navigate(tab) {
  if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
  document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
  const el = document.getElementById('nav-' + tab);
  if (el) el.classList.add('active');
  document.getElementById('page-title').textContent =
    { dashboard:'Dashboard', sequences:'Sequences', subscribers:'Subscribers', analytics:'Analytics', testemail:'Test Email', settings:'Settings' }[tab];
  document.getElementById('topbar-actions').innerHTML = '';
  document.getElementById('content').innerHTML = '<div style="padding:40px;text-align:center;color:#6b7280">Loading…</div>';
  if (tab==='dashboard') await renderDashboard();
  else if (tab==='sequences') await renderSequences();
  else if (tab==='subscribers') await renderSubscribers();
  else if (tab==='analytics') await renderAnalytics();
  else if (tab==='testemail') await renderTestEmail();
  else if (tab==='settings') await renderSettings();
}

function getNextSendMs(timeStr, tz) {
  if (!timeStr) return null;
  try {
    const [hh, mm] = timeStr.split(':').map(Number);
    const now = new Date();
    const todayStr = now.toLocaleDateString('en-CA', { timeZone: tz });
    const target = new Date(`${todayStr}T${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:00`);
    if (target <= now) target.setDate(target.getDate() + 1);
    return target.getTime() - now.getTime();
  } catch { return null; }
}
function formatCountdown(ms) {
  if (ms === null) return '--:--:--';
  const t = Math.max(0, Math.floor(ms / 1000));
  return `${String(Math.floor(t/3600)).padStart(2,'0')}:${String(Math.floor((t%3600)/60)).padStart(2,'0')}:${String(t%60).padStart(2,'0')}`;
}
function startCountdown(timeStr, tz) {
  if (countdownInterval) clearInterval(countdownInterval);
  const tick = () => { const el = document.getElementById('countdown-timer'); if (!el) { clearInterval(countdownInterval); return; } el.textContent = formatCountdown(getNextSendMs(timeStr, tz)); };
  tick(); countdownInterval = setInterval(tick, 1000);
}
function formatTime12(t) { if (!t) return ''; const [h,m]=t.split(':').map(Number); return `${h%12||12}:${String(m).padStart(2,'0')} ${h>=12?'PM':'AM'}`; }
function tzLabel(tz) { return ({'America/New_York':'ET','America/Chicago':'CT','America/Denver':'MT','America/Los_Angeles':'PT'})[tz]||tz; }

// ── DASHBOARD ────────────────────────────────────────────────────────────────
async function renderDashboard() {
  const [{ data: seqs },{ data: enrs },{ data: logs },{ data: rows }] = await Promise.all([
    sb.from('sequences').select('id,active'),
    sb.from('enrollments').select('status'),
    sb.from('send_log').select('id,sent_at').order('sent_at',{ascending:false}).limit(200),
    sb.from('settings').select('key,value'),
  ]);
  const cfg = Object.fromEntries((rows||[]).map(r=>[r.key,cfgVal(r.value)]));
  const sendTime = cfg.send_time||''; const sendTz = cfg.send_timezone||'America/New_York';
  const today = new Date().toDateString();
  const sentToday = (logs||[]).filter(l=>new Date(l.sent_at).toDateString()===today).length;
  const scheduleDisplay = sendTime ? `Daily at ${formatTime12(sendTime)} (${tzLabel(sendTz)})` : 'Not scheduled — set a time in Settings';
  document.getElementById('content').innerHTML = `
    <div class="cards">
      <div class="card"><div class="label">Active Sequences</div><div class="value" style="color:var(--blue)">${(seqs||[]).filter(s=>s.active).length}</div><div class="sub">${(seqs||[]).length} total</div></div>
      <div class="card"><div class="label">Active Enrollments</div><div class="value">${(enrs||[]).filter(e=>e.status==='active').length}</div><div class="sub">${(enrs||[]).filter(e=>e.status==='completed').length} completed</div></div>
      <div class="card"><div class="label">Sent Today</div><div class="value" style="color:var(--green)">${sentToday}</div><div class="sub">emails</div></div>
      <div class="card"><div class="label">Total Sent</div><div class="value">${(logs||[]).length}</div><div class="sub">all time</div></div>
    </div>
    <div class="panel" style="margin-bottom:20px">
      <div class="panel-header"><h2>Scheduled Send</h2><button class="btn btn-secondary btn-sm" onclick="navigate('settings')">Change Schedule</button></div>
      <div style="padding:20px">
        <div class="countdown-box">
          <div>
            <div class="countdown-label">Next send in</div>
            <div class="countdown-time" id="countdown-timer">--:--:--</div>
            <div class="countdown-label" style="margin-top:6px">${scheduleDisplay}</div>
          </div>
          <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end">
            <button class="btn" style="background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.3)" id="send-btn" onclick="sendNow()">&#9654; Send Now</button>
            <span id="send-status" style="font-size:12px;opacity:.85"></span>
          </div>
        </div>
        <div id="run-status-box" style="margin-top:14px;display:none;background:var(--gray-light);border-radius:8px;padding:14px 16px;font-size:13px">
          <div style="display:flex;align-items:center;gap:10px">
            <span id="run-status-dot" style="width:10px;height:10px;border-radius:50%;flex-shrink:0;background:#d1d5db"></span>
            <div><div id="run-status-text" style="font-weight:600">Checking…</div><div id="run-status-time" style="color:var(--gray);margin-top:2px"></div></div>
            <a id="run-status-link" href="#" target="_blank" style="margin-left:auto;font-size:12px;color:var(--blue)">View on GitHub →</a>
          </div>
        </div>
      </div>
    </div>
    <div class="panel"><div class="panel-header"><h2>Recent Activity</h2><button class="btn btn-secondary btn-sm" onclick="refreshLog()">Refresh</button></div><div id="recent-log"><div class="empty">Loading…</div></div></div>`;
  if (sendTime) startCountdown(sendTime, sendTz);
  await refreshLog(); checkRunStatus();
}

async function refreshLog() {
  const { data: recent } = await sb.from('send_log').select('sent_at,step_number,brevo_message_id,enrollments(email,sequences(name))').order('sent_at',{ascending:false}).limit(20);
  document.getElementById('recent-log').innerHTML = !recent||!recent.length
    ? '<div class="empty">No sends yet.</div>'

}

async function checkRunStatus(poll) {
  const { data: rows } = await sb.from('settings').select('key,value');
  const cfg = Object.fromEntries((rows||[]).map(r=>[r.key,cfgVal(r.value)]));
  if (!cfg.github_token||!cfg.github_repo) return;
  const box=document.getElementById('run-status-box'); if (!box) return;
  try {
    const r = await fetch(`https://api.github.com/repos/${cfg.github_repo}/actions/workflows/drip.yml/runs?per_page=1`,{headers:{'Authorization':`Bearer ${cfg.github_token}`,'Accept':'application/vnd.github+json'}});
    const data = await r.json(); const run = data.workflow_runs?.[0]; if (!run){box.style.display='none';return;}
    box.style.display='block'; document.getElementById('run-status-link').href=run.html_url;
    const dot=document.getElementById('run-status-dot'),text=document.getElementById('run-status-text'),time=document.getElementById('run-status-time');
    if (run.status==='in_progress'||run.status==='queued'){dot.style.background='#f59e0b';text.textContent=run.status==='queued'?'Queued…':'Running…';time.textContent=`Started ${new Date(run.created_at).toLocaleString()}`;if(poll!==false)setTimeout(()=>checkRunStatus(true),10000);}
    else if (run.conclusion==='success'){dot.style.background='#10b981';text.textContent='Completed successfully';time.textContent=`Finished ${new Date(run.updated_at).toLocaleString()}`;if(poll)refreshLog();}
    else if (run.conclusion==='failure'){dot.style.background='#ef4444';text.textContent='Run failed — check GitHub Actions';time.textContent=`Failed ${new Date(run.updated_at).toLocaleString()}`;}
    else{dot.style.background='#d1d5db';text.textContent=`Last run: ${run.conclusion||run.status}`;time.textContent=new Date(run.created_at).toLocaleString();}
  } catch(e){box.style.display='none';}
}

async function sendNow() {
  const btn=document.getElementById('send-btn'),status=document.getElementById('send-status');
  btn.disabled=true; status.textContent='Triggering…';
  const { data: rows } = await sb.from('settings').select('key,value');
  const cfg = Object.fromEntries((rows||[]).map(r=>[r.key,cfgVal(r.value)]));
  if (!cfg.github_token||!cfg.github_repo){status.textContent='GitHub token/repo not set.';btn.disabled=false;return;}
  try {
    const r = await fetch(`https://api.github.com/repos/${cfg.github_repo}/actions/workflows/drip.yml/dispatches`,{method:'POST',headers:{'Authorization':`Bearer ${cfg.github_token}`,'Accept':'application/vnd.github+json','Content-Type':'application/json'},body:JSON.stringify({ref:'main'})});
    if (r.status===204){status.textContent='✓ Triggered!';setTimeout(()=>checkRunStatus(true),3000);}
    else{const err=await r.json();status.textContent='Error: '+(err.message||r.status);}
  } catch(e){status.textContent='Failed: '+e.message;}
  btn.disabled=false;
}

async function openStepsModal(seqId,seqName) {
  const { data: steps } = await sb.from('steps').select('*').eq('sequence_id',seqId).order('step_number');
  const nextNum=steps&&steps.length?steps[steps.length-1].step_number+1:1;
  showModal(`<h2>Steps — ${seqName}</h2><div id="steps-list">${!steps||!steps.length?'<div class="empty">No steps yet.</div>':steps.map(s=>stepCard(s)).join('')}</div><button class="btn btn-ghost" style="margin-top:12px;width:100%" onclick="openStepForm('${seqId}','${esc(seqName)}',${nextNum},null)">+ Add Step</button><div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Done</button></div>`,true);
}

function delay(s){const p=[s.delay_days>0?`${s.delay_days}d`:'',s.delay_hours>0?`${s.delay_hours}h`:'',s.delay_minutes>0?`${s.delay_minutes}m`:''].filter(Boolean);return p.length?p.join(' '):'Immediately';}

function stepCard(s) {
  const bl=s.batch_limit>0?s.batch_limit:null,iv=s.batch_interval_minutes>0?s.batch_interval_minutes:null;
  const bt=bl?`Batch: ${bl}${iv?`, ${iv} min apart`:''}`:iv?`${iv} min between`:'No batch limit';
  const tp=s.tags?s.tags.split(',').map(t=>t.trim()).filter(Boolean).map(t=>`<span class="tag-pill">${t}</span>`).join(''):'';
  const bp=s.body?s.body.replace(/<[^>]+>/g,'').trim().substring(0,80)+(s.body.length>80?'…':''):'';
  return `<div class="step-card"><div class="step-card-header"><div style="display:flex;align-items:flex-start;gap:10px;flex:1;min-width:0"><div class="step-num" style="margin-top:2px">${s.step_number}</div><div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:600">${s.subject}</div><div class="step-meta">Wait: ${delay(s)} · ${s.from_email}</div>${bp?`<div class="step-body-preview">"${bp}"</div>`:''}<div class="step-meta" style="margin-top:4px">${bt}</div>${tp?`<div style="margin-top:5px">${tp}</div>`:''}</div></div><div class="actions" style="flex-shrink:0;margin-left:10px"><button class="btn btn-secondary btn-sm" onclick="openStepForm('${s.sequence_id}','_',${s.step_number},'${s.id}')">Edit</button><button class="btn btn-danger btn-sm" onclick="deleteStep('${s.id}','${s.sequence_id}')">×</button></div></div></div>`;
}

function openStepForm(seqId,seqName,stepNum,stepId) {
  showModal(`<h2>${stepId?'Edit':'New'} Step ${stepNum}</h2>
    <div class="section-title">Email Details</div>
    <div class="form-group"><label>Subject Line</label><input id="st-subj" placeholder="Quick question"></div>

async function saveStep(seqId,seqName,stepNum,stepId) {
  const payload={sequence_id:seqId,step_number:stepNum,subject:document.getElementById('st-subj').value.trim(),from_email:document.getElementById('st-from').value.trim(),template_id:1,delay_days:parseInt(document.getElementById('st-days').value)||0,delay_hours:parseInt(document.getElementById('st-hours').value)||0,delay_minutes:parseInt(document.getElementById('st-mins').value)||0,body:document.getElementById('st-body').value,batch_limit:parseInt(document.getElementById('st-batch').value)||0,batch_interval_minutes:parseInt(document.getElementById('st-interval').value)||0,tags:document.getElementById('st-tags').value.trim()};
  if (!payload.subject||!payload.from_email){alert('Subject and From required');return;}
  let error;
  if (stepId)({error}=await sb.from('steps').update(payload).eq('id',stepId));
  else({error}=await sb.from('steps').insert(payload));
  if (error){alert('Save failed: '+error.message);return;}
  openStepsModal(seqId,seqName);
}

async function saveList(id){const name=document.getElementById('ls-name').value.trim(),description=document.getElementById('ls-desc').value.trim();if(!name){alert('Name required');return;}let error;if(id)({error}=await sb.from('lists').update({name,description}).eq('id',id));else({error}=await sb.from('lists').insert({name,description}));if(error){alert(error.message);return;}closeModal();renderListsTab();}
async function deleteList(id){if(!confirm('Delete list?'))return;await sb.from('lists').delete().eq('id',id);renderListsTab();}

async function viewListMembers(listId,listName){const{data:members}=await sb.from('list_contacts').select('id,email,name,added_at').eq('list_id',listId).order('added_at',{ascending:false});showModal(`<h2>${listName} (${(members||[]).length} members)</h2><div style="margin-bottom:16px"><button class="btn btn-primary btn-sm" onclick="bulkAddToListModal('${listId}','${esc(listName)}')">+ Bulk CSV</button></div>${!members||!members.length?'<div class="empty">No members.</div>':`<table><thead><tr><th>Email</th><th>Name</th><th></th></tr></thead><tbody>${members.map(m=>`<tr><td>${m.email}</td><td>${m.name||'—'}</td><td><button class="btn btn-danger btn-sm" onclick="removeListMember('${m.id}','${listId}','${esc(listName)}')">Remove</button></td></tr>`).join('')}</tbody></table>`}<div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Close</button></div>`,true);}
async function removeListMember(id,listId,listName){await sb.from('list_contacts').delete().eq('id',id);viewListMembers(listId,listName);}
async function bulkAddToListModal(listId,listName){showModal(`<h2>Bulk Add to "${listName}"</h2><div class="form-group"><label>One per line: email, Name</label><textarea id="batl-csv" style="min-height:160px" placeholder="john@example.com, John Smith&#10;jane@example.com"></textarea></div><div class="modal-footer"><button class="btn btn-secondary" onclick="viewListMembers('${listId}','${esc(listName)}')">Back</button><button class="btn btn-primary" onclick="doBulkAddToList('${listId}','${esc(listName)}')">Add All</button></div>`);}
