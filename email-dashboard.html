<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Control — Blu Balence</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#1a56db;--blue-dark:#1141a8;--blue-light:#e8f0fe;--gray:#6b7280;--gray-light:#f3f4f6;--border:#e5e7eb;--text:#111827;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--purple:#8b5cf6}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray-light);color:var(--text);height:100vh;overflow:hidden}
#config-screen{position:fixed;inset:0;background:var(--gray-light);display:flex;align-items:center;justify-content:center;z-index:200}
#config-screen .box{background:#fff;border-radius:12px;padding:32px;width:440px;box-shadow:0 4px 24px rgba(0,0,0,.1)}
#config-screen h1{font-size:22px;font-weight:700;margin-bottom:6px}
#config-screen .sub{color:var(--gray);font-size:14px;margin-bottom:24px}
#app{display:none;width:100%;height:100vh;flex-direction:row}
#app.show{display:flex}
#sidebar{width:220px;background:var(--blue);color:#fff;display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:24px 20px 20px;font-weight:700;font-size:16px;border-bottom:1px solid rgba(255,255,255,.1)}
.logo span{opacity:.7;display:block;font-size:12px;font-weight:400;margin-top:2px}
nav{padding:12px 0;flex:1}
nav a{display:flex;align-items:center;gap:10px;padding:10px 20px;color:rgba(255,255,255,.8);text-decoration:none;font-size:14px;cursor:pointer;transition:background .15s}
nav a:hover,nav a.active{background:rgba(255,255,255,.15);color:#fff}
nav a.active{font-weight:600}
nav a svg{width:18px;height:18px;flex-shrink:0}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:#fff;border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
#topbar h1{font-size:18px;font-weight:600}
#content{flex:1;overflow-y:auto;padding:24px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px}
.card{background:#fff;border-radius:10px;padding:20px;border:1px solid var(--border)}
.card .label{font-size:12px;color:var(--gray);text-transform:uppercase;letter-spacing:.05em}
.card .value{font-size:28px;font-weight:700;margin-top:6px}
.card .sub{font-size:12px;color:var(--gray);margin-top:4px}
.panel{background:#fff;border-radius:10px;border:1px solid var(--border);overflow:hidden;margin-bottom:20px}
.panel-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.panel-header h2{font-size:15px;font-weight:600}
table{width:100%;border-collapse:collapse}
th{padding:10px 16px;text-align:left;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--gray);background:var(--gray-light)}
td{padding:12px 16px;font-size:14px;border-top:1px solid var(--border)}
tr:hover td{background:#fafafa}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:7px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:var(--blue);color:#fff}
.btn-secondary{background:var(--gray-light);color:var(--text);border:1px solid var(--border)}
.btn-danger{background:var(--red);color:#fff}
.btn-ghost{background:none;color:var(--blue);border:1px solid var(--blue)}
.btn-sm{padding:5px 10px;font-size:12px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:500;margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:7px;font-size:14px;outline:none;transition:border-color .15s;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--blue)}
.form-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:12px;padding:24px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal h2{font-size:18px;font-weight:600;margin-bottom:20px}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:20px;border-top:1px solid var(--border)}
.badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:12px;font-weight:500}
.badge-green{background:#d1fae5;color:#065f46}
.badge-gray{background:#f3f4f6;color:#6b7280}
.badge-yellow{background:#fef3c7;color:#92400e}
.badge-red{background:#fee2e2;color:#991b1b}
.badge-blue{background:var(--blue-light);color:var(--blue-dark)}
.badge-purple{background:#ede9fe;color:#5b21b6}
.toggle{position:relative;width:40px;height:22px;display:inline-block}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#d1d5db;border-radius:22px;cursor:pointer;transition:background .2s}
.toggle input:checked+.toggle-slider{background:var(--blue)}
.toggle-slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle input:checked+.toggle-slider:before{transform:translateX(18px)}
.empty{text-align:center;padding:40px;color:var(--gray);font-size:14px}
.actions{display:flex;gap:6px}
.step-card{background:var(--gray-light);border-radius:8px;padding:14px 16px;margin-bottom:10px;border:1px solid var(--border)}
.step-card-header{display:flex;align-items:center;justify-content:space-between}
.step-num{background:var(--blue);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.step-meta{font-size:12px;color:var(--gray);margin-top:4px}
.step-body-preview{font-size:12px;color:#374151;margin-top:4px;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:400px}
textarea{resize:vertical;min-height:80px}
.section-title{font-size:13px;font-weight:600;margin:16px 0 8px;color:var(--gray);text-transform:uppercase;letter-spacing:.04em}
.hint{font-size:12px;color:var(--gray);margin-top:4px}
.tag-pill{display:inline-block;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:500;background:var(--blue-light);color:var(--blue-dark);margin-right:4px;margin-top:3px}
.info-banner{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:12px 16px;font-size:13px;color:#1e40af;margin-bottom:20px}
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:12px;font-weight:500;color:var(--gray)}
.fg select,.fg input{padding:7px 10px;border:1px solid var(--border);border-radius:7px;font-size:13px;background:#fff;outline:none}
.fg select:focus,.fg input:focus{border-color:var(--blue)}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:14px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:10px;padding:16px;border:1px solid var(--border);text-align:center}
.stat-card .sv{font-size:26px;font-weight:700}
.stat-card .sl{font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.05em;margin-top:4px}
.stat-card .ss{font-size:12px;color:var(--gray);margin-top:2px}
.days-grid{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.day-chip{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--gray);transition:all .15s}
.day-chip.on{background:var(--blue);color:#fff;border-color:var(--blue)}
/* ── NEW STYLES ── */
.countdown-box{background:linear-gradient(135deg,var(--blue),var(--blue-dark));color:#fff;border-radius:10px;padding:20px 24px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.countdown-time{font-size:42px;font-weight:700;letter-spacing:.05em;font-family:monospace;font-variant-numeric:tabular-nums}
.countdown-label{font-size:11px;opacity:.75;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.countdown-detail{font-size:13px;opacity:.85;margin-top:6px}
.countdown-right{text-align:right;font-size:13px;opacity:.85;line-height:1.6}
.reply-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:10px;cursor:pointer;transition:box-shadow .15s;display:flex;align-items:flex-start;gap:14px}
.reply-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.09)}
.reply-card.unread{border-left:3px solid var(--blue)}
.reply-meta{flex:1;min-width:0}
.reply-from{font-weight:600;font-size:14px}
.reply-subj{font-size:13px;color:var(--gray);margin-top:2px}
.reply-preview{font-size:13px;color:#374151;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.reply-time{font-size:11px;color:var(--gray);flex-shrink:0;white-space:nowrap}
.reply-thread{background:var(--gray-light);border-radius:8px;padding:14px;margin-bottom:16px;font-size:14px;line-height:1.6;white-space:pre-wrap;max-height:260px;overflow-y:auto}
.inbox-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:10px;display:flex;align-items:center;gap:14px}
.inbox-info{flex:1;min-width:0}
.inbox-name{font-weight:600;font-size:15px}
.inbox-email{font-size:13px;color:var(--gray);margin-top:2px}
.inbox-hint{font-size:11px;color:var(--gray);margin-top:2px}
.seq-sched{display:inline-block;font-size:11px;padding:2px 7px;border-radius:4px;background:var(--blue-light);color:var(--blue-dark);margin-top:4px}
.unread-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--red);margin-left:6px;flex-shrink:0}
</style>
</head>
<body>

<div id="config-screen">
  <div class="box">
    <h1>Email Control</h1>
    <p class="sub">Connect your Supabase project to get started. Find these in Supabase → Project Settings → API.</p>
    <div class="form-group"><label>Supabase Project URL</label><input id="cfg-url" type="url" placeholder="https://xxxx.supabase.co"></div>
    <div class="form-group"><label>Supabase Service Role Key</label><input id="cfg-key" type="text" placeholder="eyJ..."></div>
    <div id="cfg-error" style="display:none;color:var(--red);font-size:13px;margin-bottom:10px"></div>
    <button class="btn btn-primary" style="width:100%" onclick="saveConfig()">Connect</button>

<div id="app">
  <div id="sidebar">

    <nav>

<script>
let sb;
let aF = { days: '30', seqId: '', status: '', search: '' };

function saveConfig() {
  const url = document.getElementById('cfg-url').value.trim();
  const key = document.getElementById('cfg-key').value.trim();
  if (!url || !key) { alert('Both fields are required'); return; }
  localStorage.setItem('sb_url', url);
  localStorage.setItem('sb_key', key);
  boot(url, key);
}

function boot(url, key) {
  try { sb = supabase.createClient(url, key); }
  catch(e) {
    const err = document.getElementById('cfg-error');
    if (err) { err.textContent = 'Failed to connect: ' + e.message; err.style.display = 'block'; }
    return;
  }
  document.getElementById('config-screen').style.display = 'none';
  document.getElementById('app').classList.add('show');
  navigate('dashboard');
  initAutoSend();
  refreshUnreadBadge();
}

async function navigate(tab) {
  document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
  const el = document.getElementById('nav-' + tab);
  if (el) el.classList.add('active');
  document.getElementById('page-title').textContent =
    { dashboard:'Dashboard', sequences:'Sequences', subscribers:'Subscribers', analytics:'Analytics', settings:'Settings', inboxes:'Inboxes', replies:'Replies' }[tab] || tab;
  document.getElementById('topbar-actions').innerHTML = '';
  document.getElementById('content').innerHTML = '<div style="padding:40px;text-align:center;color:#6b7280">Loading…</div>';
  if (tab === 'dashboard') await renderDashboard();
  else if (tab === 'sequences') await renderSequences();
  else if (tab === 'subscribers') await renderSubscribers();
  else if (tab === 'analytics') await renderAnalytics();
  else if (tab === 'settings') await renderSettings();
  else if (tab === 'inboxes') await renderInboxes();
  else if (tab === 'replies') await renderReplies();
}

function cfgVal(v) { return typeof v === 'string' ? v.replace(/^"|"$/g, '') : (v || ''); }

/* ─── COUNTDOWN ─── */
function computeNextSendMs(sendTime, sendDays, tz) {
  if (!sendTime || !sendDays || !sendDays.length) return null;
  const [sendH, sendM] = sendTime.split(':').map(Number);
  const now = new Date();
  for (let d = 0; d <= 7; d++) {
    const probe = new Date(now.getTime() + d * 86400000);
    const str = probe.toLocaleString('en-US', {
      timeZone: tz, hour12: false,
      year:'numeric', month:'2-digit', day:'2-digit',
      weekday:'short', hour:'2-digit', minute:'2-digit', second:'2-digit'
    });
    const m = str.match(/(\w+),\s+(\d+)\/(\d+)\/(\d+),\s+(\d+):(\d+):(\d+)/);
    if (!m) continue;
    const [, wday, mo, da, yr, h, min, sec] = m;
    const dayKey = {Sun:'sun',Mon:'mon',Tue:'tue',Wed:'wed',Thu:'thu',Fri:'fri',Sat:'sat'}[wday] || '';
    if (!sendDays.includes(dayKey)) continue;
    const curMin = parseInt(h) * 60 + parseInt(min);
    const sendMin = sendH * 60 + sendM;
    if (d === 0 && curMin >= sendMin) continue;
    const tzNowMs = new Date(`${yr}-${mo}-${da}T${h}:${min}:${sec}Z`).getTime();
    const offset = probe.getTime() - tzNowMs;
    const tzSendMs = new Date(`${yr}-${mo}-${da}T${String(sendH).padStart(2,'0')}:${String(sendM).padStart(2,'0')}:00Z`).getTime();
    const utcSend = tzSendMs + offset;
    if (utcSend > now.getTime()) return utcSend - now.getTime();
  }
  return null;
}

function startCountdown(sendTime, sendDays, tz) {
  if (window._countdownTimer) clearInterval(window._countdownTimer);
  function tick() {
    const el = document.getElementById('cd-time');
    const dtEl = document.getElementById('cd-next');
    if (!el) { clearInterval(window._countdownTimer); return; }
    const ms = computeNextSendMs(sendTime, sendDays, tz);
    if (ms === null) { el.textContent = '—'; if (dtEl) dtEl.textContent = 'No schedule'; return; }
    const s = Math.floor(ms / 1000);
    const h = Math.floor(s / 3600), min = Math.floor((s % 3600) / 60), sec = s % 60;
    el.textContent = `${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    if (dtEl) {
      const next = new Date(Date.now() + ms);
      dtEl.textContent = next.toLocaleString('en-US', { timeZone: tz, weekday:'short', month:'short', day:'numeric', hour:'numeric', minute:'2-digit', timeZoneName:'short' });
    }
  }
  tick();
  window._countdownTimer = setInterval(tick, 1000);
}

/* ─── DASHBOARD ─── */
async function renderDashboard() {
  const [{ data: seqs }, { data: enrs }, { data: logs }, { data: evts }, { data: settRows }, { data: seqSchedules }] = await Promise.all([
    sb.from('sequences').select('id,active'),
    sb.from('enrollments').select('status'),
    sb.from('send_log').select('id,sent_at').order('sent_at', { ascending: false }).limit(200),
    sb.from('email_events').select('event_type').limit(1000),
    sb.from('settings').select('key,value'),
    sb.from('sequences').select('id,name,send_time,send_days,active').eq('active', true),
  ]);
  const cfg = Object.fromEntries((settRows||[]).map(r => [r.key, cfgVal(r.value)]));
  const sendTime = cfg.send_time || '';
  const sendDays = (cfg.send_days || 'mon,tue,wed,thu,fri').split(',').map(d => d.trim());
  const tz = cfg.send_timezone || 'America/New_York';

  const today = new Date().toDateString();
  const sentToday = (logs || []).filter(l => new Date(l.sent_at).toDateString() === today).length;
  const evCounts = {};
  (evts || []).forEach(ev => { evCounts[ev.event_type] = (evCounts[ev.event_type] || 0) + 1; });
  const opens = evCounts['opened'] || 0;
  const clicks = evCounts['clicked'] || 0;
  const totalSent = (logs || []).length;
  const openRate = totalSent > 0 ? Math.round((opens / totalSent) * 100) : 0;
  const clickRate = totalSent > 0 ? Math.round((clicks / totalSent) * 100) : 0;

  const seqScheds = (seqSchedules || []).filter(s => s.send_time);
  const scheduleRows = seqScheds.map(s => {
    const t = s.send_time;
    const days = s.send_days || cfg.send_days || 'mon-fri';
    const ms = computeNextSendMs(t, days.split(',').map(d=>d.trim()), tz);
    const nextStr = ms ? new Date(Date.now() + ms).toLocaleString('en-US', { timeZone: tz, weekday:'short', month:'short', day:'numeric', hour:'numeric', minute:'2-digit' }) : '—';

async function checkRunStatus(poll) {
  const { data: rows } = await sb.from('settings').select('key,value');
  const cfg = Object.fromEntries((rows||[]).map(r => [r.key, cfgVal(r.value)]));
  const token = cfg.github_token;
  const repo = cfg.github_repo;
  if (!token || !repo) return;
  const box = document.getElementById('run-status-box');
  const dot = document.getElementById('run-status-dot');
  const text = document.getElementById('run-status-text');
  const time = document.getElementById('run-status-time');
  const link = document.getElementById('run-status-link');
  if (!box) return;
  try {
    const r = await fetch(`https://api.github.com/repos/${repo}/actions/workflows/drip.yml/runs?per_page=1`, {
      headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' }
    });
    const data = await r.json();
    const run = data.workflow_runs?.[0];
    if (!run) { box.style.display = 'none'; return; }
    box.style.display = 'block';
    link.href = run.html_url;
    const started = new Date(run.created_at).toLocaleString();
    if (run.status === 'in_progress' || run.status === 'queued') {
      dot.style.background = '#f59e0b';
      text.textContent = run.status === 'queued' ? 'Queued — starting soon…' : 'Running — emails sending now…';
      time.textContent = `Started ${started}`;
      if (poll !== false) setTimeout(() => checkRunStatus(true), 10000);
    } else if (run.conclusion === 'success') {
      dot.style.background = '#10b981';
      text.textContent = 'Completed successfully';
      time.textContent = `Finished ${new Date(run.updated_at).toLocaleString()}`;
      if (poll) refreshLog();
    } else if (run.conclusion === 'failure') {
      dot.style.background = '#ef4444';
      text.textContent = 'Run failed — check GitHub Actions for details';
      time.textContent = `Failed ${new Date(run.updated_at).toLocaleString()}`;
    } else {
      dot.style.background = '#d1d5db';
      text.textContent = `Last run: ${run.conclusion || run.status}`;
      time.textContent = started;
    }
  } catch(e) { box.style.display = 'none'; }
}

async function sendNow() {
  const btn = document.getElementById('send-btn');
  const status = document.getElementById('send-status');
  btn.disabled = true;
  status.textContent = 'Triggering…';
  status.style.color = 'var(--gray)';
  const { data: rows } = await sb.from('settings').select('key,value');
  const cfg = Object.fromEntries((rows||[]).map(r => [r.key, cfgVal(r.value)]));
  const token = cfg.github_token;
  const repo = cfg.github_repo;
  if (!token || !repo) {
    status.textContent = 'GitHub token and repo not set in Settings.';
    status.style.color = 'var(--red)';
    btn.disabled = false;
    return;
  }
  try {
    const r = await fetch(`https://api.github.com/repos/${repo}/actions/workflows/drip.yml/dispatches`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
      body: JSON.stringify({ ref: 'main' }),
    });
    if (r.status === 204) {
      status.textContent = '✓ Triggered!';
      status.style.color = 'var(--green)';
      setTimeout(() => checkRunStatus(true), 3000);
    } else {
      const err = await r.json();
      status.textContent = 'Error: ' + (err.message || r.status);
      status.style.color = 'var(--red)';
    }
  } catch (e) {
    status.textContent = 'Failed: ' + e.message;
    status.style.color = 'var(--red)';
  }
  btn.disabled = false;
}

  const { data: steps } = await sb.from('steps').select('*').eq('sequence_id', seqId).order('step_number');

function delay(s) {
  const parts = [s.delay_days>0?`${s.delay_days}d`:'', s.delay_hours>0?`${s.delay_hours}h`:'', s.delay_minutes>0?`${s.delay_minutes}m`:''].filter(Boolean);
  return parts.length ? parts.join(' ') : 'Immediately';
}

function stepCard(s) {
  const batchLimit = s.batch_limit > 0 ? s.batch_limit : null;
  const interval = s.batch_interval_minutes > 0 ? s.batch_interval_minutes : null;

  const tagPills = s.tags ? s.tags.split(',').map(t => t.trim()).filter(Boolean).map(t => `<span class="tag-pill">${t}</span>`).join('') : '';
  const bodyPreview = s.body ? s.body.replace(/<[^>]+>/g, '').trim().substring(0, 80) + (s.body.length > 80 ? '…' : '') : '';
  return `<div class="step-card">
    <div class="step-card-header">
      <div style="display:flex;align-items:flex-start;gap:10px;flex:1;min-width:0">
        <div class="step-num" style="margin-top:2px">${s.step_number}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:600">${s.subject}</div>

          ${bodyPreview ? `<div class="step-body-preview">"${bodyPreview}"</div>` : ''}

}

async function saveStep(seqId, seqName, stepNum, stepId) {
  const payload = {
    sequence_id: seqId, step_number: stepNum,
    subject: document.getElementById('st-subj').value.trim(),
    from_email: document.getElementById('st-from').value.trim(),
    template_id: 1,
    delay_days: parseInt(document.getElementById('st-days').value) || 0,
    delay_hours: parseInt(document.getElementById('st-hours').value) || 0,
    delay_minutes: parseInt(document.getElementById('st-mins').value) || 0,
    body: document.getElementById('st-body').value,
    batch_limit: parseInt(document.getElementById('st-batch').value) || 0,
    batch_interval_minutes: parseInt(document.getElementById('st-interval').value) || 0,
    tags: document.getElementById('st-tags').value.trim(),
  };
  if (!payload.subject || !payload.from_email) { alert('Subject and From email are required'); return; }
  let error;
  if (stepId) ({ error } = await sb.from('steps').update(payload).eq('id', stepId));
  else ({ error } = await sb.from('steps').insert(payload));
  if (error) { alert('Save failed: ' + error.message); return; }

  openStepsModal(seqId, seq?.name || '');
}

}

async function openBulkModal() {
  const { data: seqs } = await sb.from('sequences').select('id,name').eq('active', true);
  showModal(`
    <h2>Bulk Enroll via CSV</h2>
    <div class="form-group"><label>Sequence</label><select id="bl-seq"><option value="">Select…</option>${(seqs||[]).map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select></div>
    <div class="form-group">
      <label>Paste CSV — one per line: <code>email, First Last</code></label>
      <textarea id="bl-csv" style="min-height:160px" placeholder="john@example.com, John Smith&#10;jane@example.com, Jane Doe"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="bulkEnroll()">Enroll All</button>
    </div>`);
}

async function bulkEnroll() {
  const seq = document.getElementById('bl-seq').value;
  const csv = document.getElementById('bl-csv').value.trim();
  if (!seq || !csv) { alert('Sequence and CSV required'); return; }
  const rows = csv.split('\n').map(line => {
    const [email, ...rest] = line.split(',').map(s => s.trim());
    return email && email.includes('@') ? { email, name: rest.join(' ').trim() || null, sequence_id: seq, current_step: 0, status: 'active' } : null;
  }).filter(Boolean);
  if (!rows.length) { alert('No valid emails found'); return; }
  const { error } = await sb.from('enrollments').upsert(rows, { onConflict: 'email,sequence_id', ignoreDuplicates: true });
  if (error) { alert(error.message); return; }
  closeModal(); renderSubscribers();
}
