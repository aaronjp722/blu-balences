<style>
  /* ── LOGIN ── */
  .login-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 20px;
    min-height: 60vh;
    font-family: system-ui, -apple-system, sans-serif;
  }
  .login-card {
    background: #111827;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 40px 32px;
    width: 100%;
    max-width: 400px;
    text-align: center;
    color: #e5e7eb;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }
  .login-card h1 { margin: 0 0 10px; color: #fff; font-size: 24px; }
  .login-card p { color: #9ca3af; margin-bottom: 24px; font-size: 14px; }
  .login-input {
    width: 100%;
    padding: 14px;
    margin-bottom: 12px;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: white;
    font-size: 16px;
    outline: none;
  }
  .login-input:focus { border-color: #22c55e; }
  .login-btn {
    width: 100%;
    padding: 14px;
    background: #22c55e;
    color: white;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    margin-top: 10px;
  }
  .login-btn:hover { background: #16a34a; }
  .login-btn:disabled { opacity: 0.7; cursor: wait; }
  .status-text { margin-top: 15px; font-size: 13px; min-height: 20px; }
  .forgot-link { display: block; margin-top: 20px; color: #9ca3af; text-decoration: none; font-size: 13px; }
  .forgot-link:hover { color: white; text-decoration: underline; }

  /* ── STAFF DASHBOARD ── */
  .staff-wrapper {
    display: none;
    font-family: system-ui, -apple-system, sans-serif;
    padding: 40px 20px;
    max-width: 800px;
    margin: 0 auto;
  }
  .staff-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .staff-header h1 { font-size: 24px; font-weight: 700; color: #111827; margin: 0; }
  .staff-header p { font-size: 14px; color: #6b7280; margin: 4px 0 0; }
  .signout-btn {
    padding: 8px 18px;
    background: #f3f4f6;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    color: #374151;
    font-weight: 500;
  }
  .signout-btn:hover { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }
  .tool-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
  }
  .tool-card {
    background: #111827;
    border-radius: 14px;
    padding: 28px 24px;
    text-decoration: none;
    color: #e5e7eb;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: transform 0.15s, box-shadow 0.15s;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .tool-card:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(0,0,0,0.15); }
  .tool-card .icon { font-size: 28px; }
  .tool-card .tool-title { font-size: 16px; font-weight: 700; color: #fff; }
  .tool-card .tool-desc { font-size: 13px; color: #9ca3af; line-height: 1.5; }
  .tool-card.green { border-top: 3px solid #22c55e; }
  .tool-card.blue  { border-top: 3px solid #3b82f6; }
  .tool-card.purple{ border-top: 3px solid #8b5cf6; }
</style>

<!-- LOGIN STATE -->
<div class="login-wrapper" id="login-section">
  <div class="login-card">
    <h1>Internal Sign In</h1>
    <p>Team access only.</p>
    <input id="email-field" class="login-input" type="email" placeholder="Email Address" required />
    <input id="pass-field" class="login-input" type="password" placeholder="Password" required />
    <button id="login-btn" class="login-btn">Sign In</button>
    <div id="status-msg" class="status-text"></div>
    <a href="/forgot-password" class="forgot-link">Forgot Password?</a>
  </div>
</div>

<!-- STAFF DASHBOARD STATE -->
<div class="staff-wrapper" id="staff-section">
  <div class="staff-header">
    <div>
      <h1>Staff Dashboard</h1>
      <p id="staff-email" style="color:#6b7280;font-size:14px"></p>
    </div>
    <button class="signout-btn" onclick="signOut()">Sign Out</button>
  </div>
  <div class="tool-grid">
    <a href="/email-dashboard.html" class="tool-card green">
      <div class="icon">📧</div>
      <div class="tool-title">Email Control</div>
      <div class="tool-desc">Manage drip sequences, enrollments, analytics, and auto-send scheduling.</div>
    </a>
    <a href="/dashboard" class="tool-card blue">
      <div class="icon">📊</div>
      <div class="tool-title">Dashboard</div>
      <div class="tool-desc">View business overview, reports, and key metrics.</div>
    </a>
    <a href="/clients" class="tool-card purple">
      <div class="icon">👥</div>
      <div class="tool-title">Clients</div>
      <div class="tool-desc">Manage client accounts and bookkeeping records.</div>
    </a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  if (typeof window.supabaseClient === 'undefined') {
    const CONFIG = {
      URL: "https://rfdvogakvyodixgpvqvz.supabase.co",
      KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmZHZvZ2FrdnlvZGl4Z3B2cXZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcwMzU4MDMsImV4cCI6MjA4MjYxMTgwM30.UumTuz6AaKL8uYmmNxFj1ec5CInHVNQowt6LRo4cu-E"
    };
    window.supabaseClient = window.supabase.createClient(CONFIG.URL, CONFIG.KEY);
  }

  function showDashboard(email) {
    document.getElementById('login-section').style.display = 'none';
    document.getElementById('staff-section').style.display = 'block';
    document.getElementById('staff-email').textContent = email;
  }

  function showLogin() {
    document.getElementById('login-section').style.display = 'flex';
    document.getElementById('staff-section').style.display = 'none';
  }

  async function signOut() {
    await window.supabaseClient.auth.signOut();
    showLogin();
  }

  // Check existing session on page load
  window.supabaseClient.auth.getSession().then(({ data: { session } }) => {
    if (session && session.user) {
      showDashboard(session.user.email);
    }
  });

  document.addEventListener("DOMContentLoaded", function () {
    const btn = document.getElementById('login-btn');
    const emailInput = document.getElementById('email-field');
    const passInput = document.getElementById('pass-field');
    const msg = document.getElementById('status-msg');

    if (btn) {
      btn.addEventListener('click', async () => {
        msg.textContent = "";
        msg.style.color = "";
        const email = emailInput.value.trim();
        const password = passInput.value;
        if (!email || !password) {
          msg.textContent = "Please enter both email and password.";
          msg.style.color = "#ef4444";
          return;
        }
        const originalText = btn.innerText;
        btn.innerText = "Signing in...";
        btn.disabled = true;
        try {
          const { data, error } = await window.supabaseClient.auth.signInWithPassword({ email, password });
          if (error) throw error;
          msg.textContent = "Success!";
          msg.style.color = "#22c55e";
          showDashboard(data.user.email);
        } catch (err) {
          console.error("Login Error:", err);
          msg.textContent = err.message || "Invalid email or password.";
          msg.style.color = "#ef4444";
          btn.innerText = originalText;
          btn.disabled = false;
        }
      });
    }
  });
</script>
